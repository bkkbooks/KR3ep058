body:
  text: 卷二七情內傷門一喘案某真陰不足腎失司攝之權氣不歸原致咳喘數月脾土大傷飲食少進營衛交虛寒熱更作兩脈細澀漸有喘滿之虞書云夫外感之喘治肺內傷之喘治腎以腎主納氣妄擬金匱腎氣煎攝納下元以觀動靜大熟地製附子上肉桂北五味山萸肉遠志肉懷山藥懷牛膝福澤瀉於術車前子甘枸杞青鉛紫衣胡桃肉案某症緣思慮傷脾土不生金金欠生水三臟均虧再加木火凌金以致喘促不寧飲食難進脈息沉澀神色衰奪勢屬險要大抵此症治實者攻之即效無所難也治虛者補之而不應良非易也夫外感之喘治肺內傷之喘治腎以腎主納氣故用補腎之品仍防虛脫之變方缺案某恙由咳嗽而喘初起於夏後發於秋總經百日而愈夫喘症在肺為實在腎為虛然必腎先虧而後邪客於肺鬱熱作痰遂成喘促藥宜養陰和榮益氣固肺諒中病機也方缺案某診得脈息細弱脾腎兩虧土不滲濕久而為飲以致咳喘不堪作枕氣難接續擬金水六君煎治之白歸身大熟地茯苓水炙甘草橘絡法半夏恩協關名懋喘症丸方東洋參咀片粳米拌炒黃毛鹿角酥炙紫河車大熟地大生地當歸甘枸杞子懷牛膝生杜仲肉蓯蓉北五味子天門冬川黃柏肅州鎖陽原藥等分製法載在古方選注以上十四味揀選道地藥材依法虔修精製共取重羅細末用煉蜜和丸如小緑豆大每早服開水送下金按此方括蒼吳球宗丹溪之旨創立大造丸大造者其功最大有如再造故名上能金水相生下可乙癸同治雙療營衛功倍原方新加洋參收納真元之氣鹿角保護督脈之陽河車稟父母精中之氣而成乃乾坤之橐籥鉛汞之匡廓所謂胚胎兆九混元歸一者也為補養先天之妙品用熟地即以生地為佐乃白飛霞天一生水之法當歸枸杞益血添精牛膝杜仲強筋壯骨肉蓯蓉暖腎中真陽五味子攝腎中真陰天冬保肺恐邪火上僭灼金黃柏堅陰下守丹田真氣復以鎖陽之澀封固周密諸法具備力量宏深夫是謂之大造庶得曰可閲王晉三絳雪園古方選注原有此條今復著述並非録舊實因此公之喘病服煎丸多劑不效從招余診先擬金水六君煎加紫衣胡桃肉連進數帖便獲微效復以此丸加味服半月頗得大效舉發亦稀可謂對症之至余不忍埋沒治病如神陰騭無量兼句法純粹製法精良故表而出之二痰飲案某脾濕生痰肺金致弱經云稠則為痰稀則為飲痰飲乃濁陰所化阻遏陽氣不交於陰陰蹺空夜間寤多寐少咳嗽氣喘難安診脈右部大於左尺左關漸見洪數恐犯五行相剋之忌靈樞用秫米半夏湯謂通陽交陰堵截飲邪不聚中焦總以護陽為主亦金匱有云治飲不治咳當以溫藥和之也苓薑朮桂湯合二陳湯加蘇子霜苦杏仁秫秫米三喘滿案海州張堠細閲病由水泛高源之象書云先喘後腫在肺肺氣久虛子病及母脾肺既虛土不勝濕濕濁羈留以致下部腫勢不消時有自汗痰壅喉間視此情形喘滿之症成矣轉瞬春令肝木司權厥陽上衝防衰脫之虞方缺四滿病案王左濕積成痰飲臟寒生滿病此症已屬難治況兼瘕聚不消不散居於臍上脘下邪氣日盛正氣日衰尚延至春木寡於畏必來剋土則脹喘難支則擬王冰燾茯苓飲法徐徐調治土白茯苓西黨參焦白朮小枳實乾薑煨薑紅棗五肺痹案海州城南武總戌大少君字枚村膏方原枝大熟地淨白歸身東陽白芍經霜桑葉黑脂麻女貞子秋旱蓮草甘枸杞杭黃甘菊白蒺藜南燭葉廣陳皮黑穭豆抱木茯神肥玉竹上藥共入大銅鍋內長流水浸透文武火熬一枝香時澄清去渣再熬一枝香時澄清去渣再熬一枝香時用真阿膠開水燉化收膏磁具盛貯每早晚各服一調羹均以百滾湯和勻燉溫食之謹按貴恙在書名曰肺痹原委悉注煎方愚今所擬膏方君臣配合佐使相投藥餌滋潤氣味純和大有裨於此也茲選君主地黃益真陰而滋腎臣輔歸芍養血液以柔肝佐用桑麻清肅肺氣應候播植生機其功亦溥又協以貞蓮法陰陽之遞轉更助以杞菊為升降之春秋蒺藜南燭一填一養不致肌虛之困陳皮穭豆一通一補俾無壅滯之情茯神玉竹屬營衛報使真貢阿膠系清濁激揚類皆滋營養液之品堪舒經絡隧道猶須滌慮澄心反觀內守久久服之則獲效庶捷如影響矣六肝旺肺虛案梁藩憲七少君字雨叔丸方生茶烏竹刀去皮切片曬乾太子參粳米拌炒雲茯苓現切人乳拌蒸曬甜冬朮土炒褐色嫩黃精九制福橘絡微火烘粉草節水炙苡米去心炒懷山藥白扁豆女貞子淡鹽水炒芡實米白茯苓肥玉竹炒定冬瓜仁上藥依法制成共取極細淨末用金叉斛熬膏量加煉蜂蜜為丸如梧桐子大每早服三錢滾水送下金按此方為靜心調理之準繩肝氣不和之上劑君取茶烏潤血悅顏色臣輔參苓扶正養精神佐兼冬朮啓脾經之健運協以黃精揚氣分之威儀橘甘二味頗盡和中之美卻無峻烈之嫌苡米一品雖稟秋令之涼可杜肺金之燥山藥扁豆培源益胃雙療女貞芡實濟水息肝相得茯神玉竹屬營衛報使冬瓜仁子資戊己真司石斛味甘性平激濁升清之藉蜂蜜百花釀就和風甘雨之仁服此不特調元益智且以見天地之生生有如斯也七噎膈案青口余殿緯據述每歲交秋咳嗽吐痰即發類乎痰飲之屬糾纏數月之久直未痊愈繼加年已七旬體質衰弱平日不無謀慮病情謀慮則動肝肝鬱不舒以致期門穴微覺𩞄痛乾物下咽似有阻礙食後胸痞悶痰唾如膠二便不調細推來派陽結於上陰涸於下之象勢成神思間病法當養血柔肝化痰舒郁仍須怡悅開懷一毫塵念莫起庶幾與藥餌兼功前謂勢成神思間病者即噎膈也是症三陽結最難驟愈所服藥品未嘗無效奈壽經七旬又一體質漸衰真陰日虧孤陽日熾顯屬陽結於上陰涸於下之象擬方不越生化剋制之理撫其受侮平其沖擾如此而已至於拔根當醫外求之必須心靜情怡怡則以開懷抱靜則生陰以御陽亢心得太和之氣庶克有濟茲勉撰一方盡心力而為之案具前方毋再煩贅據所述一派情形非病也衰也譬之三春宿草得雨即榮殘臘枯枝雖灌弗潤然既荷云箋賜顧不得不罄囊以立法盡心挽之或可延年太子參東陽白芍雲苓塊白茯神水炙甘草囫圇整扁豆米炒冬瓜仁須穀芽南燭子陳喬餅昨復領略函芬一切據云六脈兩寸兩尺及右關均現細微無力而左關獨大者陽結於上陰失潛藏之勢況因解便努力過甚元氣莫歸原海津液悉化稠涎咳嗽多痰飲食作噎寤寐不安晝輕夜劇形瘦面黃手肢浮腫由膝下至足皆然大便溏泄小溲短黃統屬命火衰微火不生土土欠生金金欠生水水不涵木四臟俱虧濕濁蓄踞運化遲延故屢服補劑獲效維艱前言非病也乃系虛象正此謂也再加時臨夏令心火司權最防火灼金枯木乘土位之虞且閣下前次服藥雖勤究竟症未見愈茲即擬方亦不過滋營養液以柔肝益氣培脾以祛濕從此服後如果氣血融和精神漸壯二便通調是所深幸否則藥餌難療只好抱病延年耳恙原細載於前毋庸瑣述由服藥以來大致尚屬平平但舌上生瘡此非實火可比顯系年尊命火衰微書所謂下虛必上熱者明矣今宗六味加桂附引火歸原之法六味地黃湯加桂附南燭子引陳倉米八反胃案某氣火不升肝逆犯胃是以肚口痛而乾嘔內經謂清濁相干名曰亂氣今肢冷神迷欲厥之象兩脈大而鼓指最恐閉痙不回生白芍金鈴皮茯神心冬桑葉炒丹皮川玉金左金丸和沖伏龍肝開口川椒烏梅炭青蔗汁昨進苦辛之品神識稍清肢冷已轉惟氣痛未除嘔吐不止經云諸逆衝上皆屬於火諸嘔吐酸皆屬於熱近成反胃大症當以泄肝之中佐以鎮逆為法謹防吐甚傷陽痛甚痙厥大白芍川黃連苦桔梗茯苓半夏沙參麥冬代赭石金沸草金鈴皮蔗汁秫秫米安胃烏梅丸和服九厥陰氣阻案某幾進苦辛通降均屬罔效經云濁氣在上則生䐜脹因厥陰之氣上阻則胸痛肋脹作嘔痰涎乃濁陰所化肝木犯胃胃中陽傷致大腸變化失司四五日一更衣飲食更不能進脈象細小而弦顯見風木乘土當春其勢大張舌液乾燥胃汁難免不損症重慮胃敗有暴厥之擾妄擬仲景鎮逆軟堅一法制肝和胃以觀動靜若何生代赭烏梅炭半夏萊蔔子炙枇杷根葉炒麥冬川黃連炒白芍白粳米酒炒兩頭尖十木侮土案某濁氣在上則生䐜脹清氣在下則生飧泄病經兩月初由肝鬱而起木旺則侮土脾土大傷食少自利脾虛生脹腹大如鼓兩關脈弦而兼濡滯勢有中滿之虞法宜歸芍六君以扶土茱連六一以抑木觀其動靜方缺十一肝氣痛案某肝氣痛久轉於脈絡丹溪云氣有餘便是火生風致痙又書云暴痛在經久痛在絡種種血弗養肝肝氣之所致也權當柔肝熄風定痛通絡之劑再擬養血而後可方缺十二胃脘痛案某病機賦云胃脘當心而痛要分客熱客寒按此病虛者多寒實者多熱據述初起飲食後偶遭氣怒加以素嗜生冷積久生濕濕戀寒棲清不升濁不降清濁混淆所以痛勢每日發必當酉明之陽微失運虛質可知難經論酉晉應於五臟中屬腎腎虧不與胃交蓋心肺居上胃居中而腎居下譬若一枝動則百枝胥搖矣業延日久切勿視為泛常爰以仲聖建中湯之法治之今略加減與服炒黃白芍川桂枝水炙甘草雲苓塊留白陳皮半夏曲須穀芽制香附片煨薑十三肝脾心腎傷案前仕黎河憲諡號襄勤思為脾志實本於心精以思耗水不養肝肝失條達之機侮其所不勝清氣不展濁陰不降清濁混淆脹瀉並見郁損心陰不能下交於腎腎虧不能上達於心臥不成寐盡力謀慮勞傷乎肝應乎筋極非肝家之有餘乃肝家之不足肝無補法實脾養心養腎庶免春臨木旺之虞陽往則陰來陰往則陽來一升一降無盡窮已積勞思慮痞膈中滿腹鳴瘕瀉形消脈弦穀氣不盈生氣衰甚因氣成積因積成飲積聚成痞脾陽下陷正氣大傷無攻破之理所服藥品甚是寡效者因傷已極也仍議理中益氣補火生土法大怒則形氣結氣悖於中食不運行精不化氣氣不生陰作干作渴脹痛不寐理用前方肝不和暢養心以慰之養腎以涵之養心腎和肝脾連服四劑尚屬綏和脾瀉未已中滿痞脹未松怯寒畏冷腹鳴響甚如牆傾倒之聲但風聲氣聲水聲皆真氣之虧火土不生虛極所致脾虛生濕肝虛生風腎不納氣原方加減脾胃困頓心腎兩虧守補則中焦易鈍燥劑不無傷陰陽明陽土得陰能安太陰濕土得陽始運補陰不易補陽尤難二氣難盈易虧上損過中下損及胃諸虛百損惟賴脾胃脾胃為資生化源之本化日生之氣血以稟生生之氣今以脾胃為主心腎兼治連進脾胃法飲食頗香脹勢稍平夜來得寐精神略起惟夜間降濁帶有稀水腎司二便腎不攝脾不固脾腎兩虧中陽不運氣聚成瘕瘕者假也氣也胃瘕作瀉無攻瘕之理惟扶正氣以化之補命腎以消之經云形傷思慮則肉脫養心脾腎是其美舉服藥未嘗無效奈心脾虧虛已極培補甚難今仿歸脾四神建中法添去自覺寒者非真寒也裡氣空虛也補命腎之元陽已服多劑未見啓發嘗思心屬火虛則寒神機過用心氣大虧謀慮傷肝肝虧相火亦虧子母皆虛經云虛則補其母補心相之火助脾胃運用之陽乃藉用之權衡瀉止脹平有火象生髮之機來矣上焦如霧如霖清虛之府如電照當空曠然無外天地不泰則否象見矣所謂瘕者假也氣也消脹則成鼓攻瘕則成滿況下痢形瘦胸痞不食萬無破氣攻瘕之理養正除積補命腎以化之脾胃日健痞滿自消仍以異功建中合四神法氣不生陰精不化氣陰從陽者血隨氣生恙已漸愈以扶正為主陽往陰來痞氣不化歸脾異功頗合機宜脾泄全愈胃已舒醒思食不多寐不深沉精神漸起氣色亦開病緣起於心脾氣結由來已久無形之氣化出有形之積非消非磨可比養正除積怡悅開懷徐徐調治不破氣痹為寶陰往陽來升降有常痞滿漸化大便已結形色俱起奈寐不深沉乃心氣虧虛不能下交於腎若陰平陽祕精神乃至擬五寶歸脾合方養心脾腎以和肝自服養心脾和肝腎以來納食頗香諸恙悉退漸趨佳境因積勞思慮久恙內傷最難驟復必得養心熄怒心得太和之氣庶臻康豫以養榮湯治之氣主煦之血主濡之進養榮法神安得寐納穀頗香既合機宜依先進步今因陰虛熱結痔發腫痛原方冬至節再議冬至節來諸恙向安痞脹漸消精神飲食俱佳惟痔發腫痛難安按經曰飲食自倍腸胃乃傷經脈橫解腸癖為痔乃濕熱下注陰虛氣虧所致養正氣以化濕熱生脈六君合養心秫米法痔名雖多不越內因外因虛實寒熱緣於筋脈橫解風濕熱而成中氣不振氣不化濕腫痛無寧寐食忽廢暫以防風秦艽丸以治其標再擬補中益氣加槐花以治其本外科書曰凡一切外症中虛之人若過服寒劑則正氣先虛陽氣一虧更不易治有諸內必現諸外外醫亦必明內之理今日已出稀糞連昨晚二次臍痛腹鳴而痔不減其非實火大便燥結之故可知矣虛火宜補實火宜瀉方缺十四肝腎兩傷案海州候選縣佐孫左素本質弱肝腎兩傷繼加憂鬱過度肝不藏血逆而上行咳嗽見紅或絲或點腹左瘕聚時跳時動按脈息細數恙延日久幸飲食能進生氣未衰秋冬尚可扶持歸芍地黃湯十五水不養肝案汜水華名楷素本操持煩勞內傷過重水不養肝肝失條達濕困脾胃之陽於是升降不和逆而上行致臍腹窘痛刻下雖平奈飲食懶進脘中不爽兩脅脹悶時嘔時吐兼有酸味小溲艱阻按脈弦細滯而不調右三部濡弱年已六旬再延防陰枯陽結之虞妄擬兩和法佐醒胃之品所謂王道養正善藥不計驟功赤白茯苓薑製半夏曲川陳皮真橘絡鹽水炒青皮絡米炒冬瓜仁炒黃大白芍黑穭豆衣荷葉蒂炒黃陳倉米昨服兩和法佐醒胃之品頗合機宜今用原方加味仍當怡情易性兼以藥餌調攝庶幾霍然無虞矣前方加夜交藤連進兩和醒胃之劑診得脈象漸調兩尺亦覺有力舌上腐苔頗退胸胃較寬此佳兆之明徵也但內傷日久陰陽之氣虛餒一時未能驟復公仍擬原法治之服原方三劑甚為平靜既獲效機依方進步古謂用藥如用兵千軍易得一將難求也前方加白扁豆衣減黑穭豆衣脈症漸平飲食頗增脾胃有醒豁之機惟大便七日未解腹無所苦濁氣常行此乃真陽不足運化遲難擬益氣調中佐宣絡法為是極淡蓯蓉荷葉蒂連皮白苓連皮赤苓白扁豆衣冬瓜仁真橘絡鹽水炒青皮絡炒黃陳皮炒黃白芍急流水煎十六肝氣納氣案安東大南莊朱左左手關脈細數右寸關脈濡弱兩尺沉軟症屬水不涵木腎不納氣故氣自臍下直衝而上筋惕肉瞤繼而頭目眩暈心虛無寧蓋上焦如雲如霧如電照當空天地不泰則否象見求其源當填補下焦舌有紅點亦屬陰虛火旺擬用歸芍地黃湯為穩歸芍地黃湯十七腎火咳嗽案某咳而上氣肺本清空易受寒邪前服稍稍治標之品清火潤肺理氣化痰之劑幾無遺用而病不少衰余細辨其脈右尺洪數左尺大而軟此腎虛龍火上亢乘肺金而咳嗽煩苦相火更旺子母皆虛稽經云虛則補母郁損心陰陰虧不能下交於腎腎虧不能上達於心寤不成寐盡力謀慮勞傷乎肝肝無補法實脾養心養腎腎液一足庶免春來木旺法宜加減一陰煎加減一陰煎十八真陰不足案漕憲門政周左恙由思慮過甚木旺剋土食少事煩更衣溏泄午後惡寒夜則發燒此真陰不足命門真陽失守診脈左關弦數右關濡弱今已二月矣勢屬癆損非小恙也總宜大補元煎可服三四帖應手為要九制首烏朱染麥冬紫河車懷山藥白茯苓炒香白扁豆青蒿梗生龜甲心地骨露活剝鱉肉煎湯代水十九心肝腎虛案某自覺煩者非真熱也骨髓空虛也因曲運神機太過心氣大虧肝虛腎亦虛經云腎屬水虛則熱矣理宜養奼女嬰兒之法養心以慰養腎以涵方缺二十肝膽火升案某診得右三部沉數久按無神左上中滑數腎脈細軟夜則唇乾蒸熱於火內寄於肝膽二經經火上升致左邊頭暈嗽而痰多噁心皆陰精不足宜速藥為要否恐終非所宜生茶烏孩兒參大貝母霜桑葉甘菊花白蒺藜消橘紅苦桔梗白茯苓枇杷露二十一目病案海州許寶巽目為宗脈之主其在天為日月日為陽精東升西墜月為陰精晝隱夜見陰陽二氣目皆應之故目病雖得於腎陰之虧亦得於肝陽易旺陽動陰不能攝據述左眼見黑花右眼見白花愈多愈大時而作癢作干有眵微痛此五臟精華不能上注於目少陰之樞紐不利若誤認風治禍不旋踵患經日久藥宜輕清不宜濁膩茲擬一法以冀轉機速痊倘再遲延慎防損目方缺二十二鼻淵汜水郭贊猷鼻淵數月營衛受虧清空之所升騰太過絡道無以榮養頻流紅涕寒熱交爭食懶神倦六脈細數此真陰日漸消灼救陰藥無速功用玉女煎加味治之大生地連心麥冬熟石膏懷牛膝炭白知母荷葉露二十三火剋金案某咳嗽吐涎沫已久此乃肺胃陰傷帶動肝陽上升莫制刻臨夏令火旺金被火克更屬非宜是以痰中嗽出粉紅如燭油色肺絡壅熱致傷延恐有癆損癰痿之虞今勉擬養肺胃之陰以杜陽逆不可泛泛治咳古法有諸北沙參雲茯苓生扁豆霍石斛真橘絡大貝母生苡米鮮枇杷葉白花百合白蘆根二十四吐血案本郡典商王琴溪乃侄吐血復作紅紫並見太多脈息芤大無神自汗鼻煽痰哮氣粗似喘動則較甚此金水未能相承肝不藏納之徵也妄擬生脈湯加味挽之生脈湯加茯神生龜甲心生牡蠣參三七汁黃精熬水昨進生脈湯加味今視諸弊較松奈脈象未平肺虛氣弱血液大虧仍屬可畏慎之前去參三七汁加白花百合川貝母紫衣胡桃肉診脈右寸芤大稍平左尺無力關部不寧昨今血雖未吐而金水已傷肝陽獨旺升降失司致咳嗽痰哮氣粗兼喘仍屬耽心當擬保肺之陰以納其氣滋腎之液以降其陽統望勿生歧變庶幾漸步坦途耳三才湯仍加白花百合紫衣胡桃肉案某咳嗽夾紅湧吐四五次雖屬肝火而肺氣先傷陰分亦虧暴病屬實久病屬虛不得不用犀角地黃湯引火歸原引血歸經否則飲食漸少汗勢漸來然腎開竅於二陰腎為胃之關胃不納食金無所生矣犀角地黃湯案鎮江趙七爺字溥泉失血之後脈沉小者可喜數大可憂肺氣易虛虛而難復久則津液不充母病及子金不生水水虧於下火炎於上熱逼肺燥咳嗆不已音啞咽乾經所謂金空則鳴金實無聲破碎亦無聲金實者乃肝陽沖灼液釀成痰喉管幹澀不易唾出也破碎者主氣不生精精不化氣元氣乖違從何依附也治當培水濟火益氣保肺佐以填補真陰法使津液日生一日火不灼金金水自然相承也再加居恆頤養靜心神怡庶乎嗆咳平而音啞轉也煎方缺膏方條沙參雲茯苓天門冬麥門冬南燭葉清阿膠潤元參紫丹參大福橘冬瓜仁秋白梨糯稻須鮮枇杷葉白蘆根川貝母蜂蜜收膏金按此方沙參定心內煩悶茯苓補土中之金天門冬補真陰麥門冬退肺經伏火君臣有燮理之奇南燭培元氣虧傷阿膠養靈臺之血元參填腎髓丹參導肝絡蓄瘀佐使無猛威之僻協以福橘止嗆咳以和中冬瓜仁是悅顏之力也助以秋梨生津液以消痰川貝母非滌熱之功歟糯稻須健己脾鼓舞戊胃枇杷葉走陽明轉入太陰蘆根活水生成通利火府蜂蜜百花釀就留戀下焦類皆滋潤寒涼藥餌涼而不滑反可引熱下行以復肺虛耳蓋羡其益坎勝離之法引北方以濟南方頻頻服此再加息慮澄心謹慎調攝庶免春令肝旺之變二十五木舌腫痛案某真陰大傷心氣不足痰熱內擾木舌腫痛不語雖飲食如常恙經半月最慮潰爛難以收功不食則變擬滋降之法多擇高明東洋參元武版生甘草女貞子青小草大生地杭白芍川貝母柏子霜朱麥冬蓮子心上西珀同珍珠末和服二十六骨痹案某先後天素虛加之濕邪蘊蓄血不榮筋筋不束骨是以右腿膝痠痛難安寐食俱廢日輕夜重脈息細澀勢屬骨痹之症非朝夕驟愈之象理從緩治誠為斯疾之良圖也方缺二十七遺精案本郡迎熏門開二兄經云有夢治心無夢治腎吾兄病多由夢而泄何可獨責之於腎殊不知腎主相火心主君火一君一相本稟賦既濟之理也蓋心之所藏者神神之所附者血心主血一疑而萌動則氣亂神恍鬱極生火致之血液沸騰心營漸熾不能交於腎故腎藏志水火不濟疑惑發生似乎病亦發生忽忽神無所定遂難保遺泄之患久必液竭精虧則真元反更虛耗矣於此而思節欲聚精無如君主疑火莫制則精又何由固密也若能心靜神怡不生疑慮君火無自而起君火一靜水火相交君寧相復遺泄可愈再加藥餌調治則諸症從此悉除矣吾兄之病最重在疑曷不勉諸方缺案某陰虛相火易動頻有遺泄以致水不涵木肝陽化風上舞故頭暈時作按脈弦小帶數刻當升令必須介屬潛藏靜可制動也方缺二十八陽關穴冷案某診脈象流動較前尚好兩尺微弱因腎之真陽失守下元不固陽關穴痠冷年分已久曾服桂附藥品雖然相對弟此患遇天陰更甚晴暖即松實屬火弱之徵必須絶去費心勞勤事助以藥餌治以百日之遙庶幾得之刻下先擬七寶美髯法暫服三帖再商制首烏當歸身甘枸杞補骨脂川杜仲菟絲餅懷牛膝二十九脾虛發腫案某診得脾脈沉細土虛已極濕困中州是以周身浮腫兩脅脹痛咳嗽胸悶現當春令肝木司權分明剋土之象今擬一法暫行扶土抑木俾脾一旺則濕氣自行乎矣連皮赤白茯苓土炒白朮新會皮法半夏宣木瓜冬瓜仁炒穀芽漢防己懷牛膝生苡米用嚴氏實脾飲加減取其補土製木之能然王道無近功必以緩得效連皮赤苓宣木瓜於術橘絡半夏曲冬瓜仁生苡米懷山藥牛膝澤瀉川厚朴生薑三十溺痛滴瀝案某水道不清心腎不交淫溢而下移熱膀胱小便痛澀滴瀝清濁並至如膏症已九天服參苓琥珀止痛清心之品病勢稍減一二但脈息微細無神實屬真陰耗損水火不相既濟藥餌宜緩功調治可也白茯苓黃柏肥知母沙參土炒白朮川萆薢澤瀉生苡仁益智仁甘草梢蓮子心燈心三十一兩肋痛案郭左兩肋作痛得食即緩此胃絡虛肝氣滯當歸鬚大白芍桂枝木橘絡蛀青皮宣木瓜川黃白芍醋炒柴胡元胡索新絳屑沉香末絹包扎三十二三陰不足案某三陰不足寒濕痰凝隧道致滑肉門關元俞兩處麻木不仁紅腫痛俱無皮冷色晦當擬陽和湯達其病所拔其病根經云熱則流通之皆不越乎此大熟地麻黃白芥子炮薑炙甘草鹿角膠上肉桂雙臘酒三十三下焦嘔吐案某嘔吐舉發纍月經年雖屢進泄肝安胃法減而未愈原屬胃陽虧乏脾不散精殊不知命門火力不足奉生者少腎虛水泛為痰肝無液養濁結氣聚氣逆上衝阻胃之降失其流行之機故時發時止此下焦吐也今仿經旨二方一則益火之源以消陰翳壯水之主以鎮陽光一則專理腸間屈曲之處搜滌絡道之痰可帶藥回府調養徐待獲效方缺三十四濕案王如金形體豐盈脈來濡滑三陰內虧濕濁鬱而不化氣運遲難以致胸次時痛目中白珠色黃小便間溺白濁按濕熱為患非只一端可化痰亦可化飲虛中夾實不可小視擬用理脾滲濕固精之法緩之治之自然諸症日減則正氣日增矣方缺丁按喜怒憂思悲恐驚七情內傷非六氣可比六氣現諸外顯而易見七情現諸內暗而難明六氣天成也七情人為也天成人為四字包括廣大矣道光辛巳恩科吾赴秋園三場後契友邀遊渠等均臨榮社評論文章估擬科名而我心不以科名自專性嗜書籍獨往書坊遍閲架上書籍之簽儒書何其多也醫書亦復不少以儒可以顯人以醫可以救人閲至抄本濟世經驗良方興起展卷視之有養生篇黃帝問岐伯曰余聞上古之人年皆度百歲而動作不衰今時之人年未半百而動作皆衰時勢異耶人將失之耶岐伯對曰上古之人知道者法於陰陽和於數術飲食有節起居有常不妄作勞故能形與神俱而終其天年度百歲乃去今時之人不然以酒為漿以妄為常醉以入房欲竭其精耗散其真不知持滿不時御神務快其心逆於生樂起居無節善妄作勞故半百而衰也觀此則壽命修短全在精氣神明依相附之寶滿盈曷常病於人也並必得其壽也統而言之為醫者心不可泥古泥則不能融會貫通也其症有因虛受病轉變為實先實後變為虛有因外感而內傷有因內傷而外感猶有不內外因而內傷者即如先生七情內傷案云真陰不足腎失司攝之權氣不歸原則用金匱腎氣並以攝納下元實系治內傷之喘在腎其次肺腎兩虧則用金水六君並以符方書土能生金金能生水金水相承之意實系治內傷之喘在肺腎不治脾而培脾寓焉脾濕生痰濁陰阻遏陽氣則用苓薑朮桂湯加二陳蘇杏秫米此闢經文通陽交陰之義實系治痰飲內傷之喘在脾若此治症胸中定有確見誠無指鹿為馬之訛頗有駃中超群之妙信不誣也夫肺痹者病在氣分氣滯血亦滯血無氣不行上焦清道惟風熱可臨釀久下損及胃穀食減少土虛生濕則窒塞經絡隧道營液干膊臂屈伸不便缺盆穴骨凸用滋營養液膏加流氣之藥經云氣主煦之血主濡之煦者和也濡者潤也氣煦和血亦濡潤矣噎膈者情志不適病也悒鬱動肝肝肺氣結血液胃汁枯稿上為噎中為膈下焦為反胃食物易噎噎則善嘔昔張雞峰謂之神思間病陰枯於下陽結於上三陽結謂之膈茲摘虞花溪大略云云大都欲成之先宜開達木鬱木鬱解而諸郁皆解矣逍遙散四七湯蔞貝二陳金橘佛手佩蘭之類欲成之後宜養血平肝肝得其養陰不枯陽不結胃氣升降舒徐則愈矣歸身白芍首烏阿膠棗仁茯神雲苓柏子仁之類如嘔酸加左金丸代赭旋覆橘皮竹茹是也如吐血加丹參貝母丹皮梔子玉金參三七藕節是也已成則無法可治縱或有愈之者非成法也乃定數也即如醫宗必讀有白水牛喉杵頭粳牛嚇叫之類亦復另具手眼獨開生面之方先賢精奧難窺底蘊種種不能枚舉晏正燕居握管吟哦適藩憲寶仁兄造吾廬云及先生作經應録汝見之乎其中濟生之功非淺晏遂告以捧册囑我刪改吾恐筆墨荒蕪豈堪評點因承不棄故敢布鼓於雷門妄談數句聊以解嘲藉欽先生學問不居人下聰明反超人上遠溯靈蘭近搜祕典特著壽人之玉版實為度世之金針云爾歲屬咸豐巳未年秋八月望日書於頤志齋柘塘丁晏識
