body:
  text: 卷四婦女疾病門一經閉案某婦診脈息細數而澀知經閉一載此衝任脈絡空虛故而晝寒夜熱時而頭暈心惕納穀不甘大便時溏土不生金金不制木木火凌肺以致咳嗽痰不易出即經所謂侮其所不勝者也宜速藥為要否恐見紅則不足之症成矣擬用培補坤元脾陽一旺則生金有助而天癸不治自來耳上洋參野於術歸身大白芍醋炒柴胡丹皮苡米白扁豆地骨皮南棗案某婦三旬以外經水忽停蔓延五載屬衝任蹺維諸脈交傷脾腎兩虛泉流日涸由色淡而短少由短少而閉斷此其枯竭已甚也庸俗無知猶云積血而通之破之則成毀瓦畫墁之談矣方缺二天癸未至案某女年長十六天癸未至致之少腹塊疼骨間蒸熱咳嗽乾嘔大便溏泄此係衝任二脈脾肺均虛已屬淹淹之累更可畏飲食不思肢體瘦削一月脈顯見枯槁必成千血癆瘵無疑白茯苓土炒於術懷山藥地骨皮水炒白芍橘絡川貝母白扁豆肥玉竹南青蒿露蛤粉阿膠後入煎三小便不禁案蔣婦小溲不禁此腎氣虛失於約束仿東垣先生法則補中益氣加益智仁小紅棗四漏經案西壩委員王如金夫人肝脾氣血交虧陰虛陽搏陰絡傷則血內溢景岳云不時妄行謂之漏由漏而淋總因奇經血病使然應擬保陰煎加減循循調治乃佳保陰煎見景岳全書八陣五血崩案張嫗老年行經每來按月如紫血之塊紅血之淋人以為還少之期抑知是血崩之漸乎不當行經而行經者乃肝不藏脾不統也非大補肝脾不可補劑中尤當兼補氣以止血用安老丹加老藕法安老丹加老藕煎湯代水六衝任不調案某婦肝氣素旺衝任不守經行數天少腹硬痛所行者有塊色如膠漆血海已虛其病愈進脈息細而兼弦症屬可畏恐其痙汗之變法宜養肝和血之中兼化停瘀當歸白茯神柏子仁九孔決明酒炒丹參女貞子棗仁遠志仁消橘紅金釵石斛上西珀清童便七濕熱凝瘀案某婦六脈細弱沉分有力刻下外感已退但經行多多腹脹硬痛此係濕熱凝瘀治宜養血歸經佐以搜濕剔瘀之劑全當歸赤芍丹參生五靈脂香附白蒺藜赤苓山楂焦柏葉澤瀉黑鬱金片苡米茺蔚子八心肺腎虛案安東花園莊喬老太太心陰虛則易汗肺陰虛則多嗽腎陰虛則發燒此三者乃損怯根萌由於勞煩過度憂思兼傷營血暗耗肝無所養且肝主筋筋脈失和從督脈痛痛雖止而身發麻又氣虛之一證也連服養血柔肝益陰涵肺養心以慰養腎以涵夏秋頗見痊安刻當冬令一陽來復升動之時蓋人身一小天地其陽一升過胃貫膈上乘嬌臟金宮不耐致肺燥化火循喉嚨則心辣咽乾咳吐痰多是火熬津液液釀成痰也但培補滋潤純陽之品勢難容緩方缺九脾肺並病案喬春墀夫人素質虛弱已久本非松柏之姿屢服湯液頗獲微功茲據述因憂鬱勞神鬱則傷肝肝氣上逆憂則傷肺肺氣不降升降無權脾胃未能旋轉以致胸口仍悶氣兼上漫空咳痰稀兩膀作疼考究病情乃屬根蒂有虧擬方不過生化剋制之理撫其受侮儆其沖擾悅胃以培脾養金以制木如是而已至欲復舊如初屆乎情調遠慮勿煩庶臻康泰矣銀條沙參雲茯苓白茯神蜜炙橘絡川貝母肥玉竹白扁豆須穀芽首烏藤米炒冬瓜仁秈稻根鬚露前案業已申明毋庸復述疊進悅胃培脾合養金制木之法尚屬平寧未生他歧刻惟午前燒熱胸口微疼空咳痰混此乃舊根也實緣肺液生化不速厥陰虛陽易動加以體質素弱由來已久擬方無非培補之品仍須遠慮勿煩謹慎調攝庶幾與藥餌兼功前方加米炒麥冬去心體弱之人氣更弱無生血之源陰虛生內熱熱流肝脾之絡致令手大指二指痛作無時再加咳唾白沫中氣短少胸前常悶此肺液不充肝鬱頗多所至今仍擬製木養金脾無賊邪之害滋陰化熱肺得治節之權惟服此法可奏膚功西洋參抱木茯神首烏藤橘絡川貝母肥玉竹丹皮甘菊花釵石斛阿膠荷筋十氣蒙胎案某婦經停六十餘日飲食惡腥間或嘔吐頭暈腰痠勢同惡阻自云前因嗔怒動肝胸痛腹脹氣鬱不伸今診脈未現滑象不可即以妊斷先擬加減搖胎散試之蘇梗廣皮川玉金陳香之皮佛手片廣木香川杜仲川續斷四制香附金橘葉荷蒂十一血瘕案桃源趙婦經阻腹痛結塊如核按之則堅推之移易能動此瘀血凝聚成瘕痛久陽虛怯寒陰虛骨蒸心惕怔忡業延半載幸穀食可餐生氣未衰作中流之砥柱理服牡丹皮散加雞血藤膏太子參一消一補方能卻病牡丹皮散加雞血藤膏太子參十二經衍致病案某婦衝任血少經事過期因虛易受六淫之氣襲入絡脈之間兩腿痠痛多日擬養血舒筋俟血足筋強則風寒濕自然解矣方缺十三肺腎不足案袁江唐婦氣血雙虛肺腎不足於是咳嗽氣喘動則更甚痰吐涎沫飲食懶進陽虛畏外寒即皮寒陰虛生內熱即骨熱延今累月脈息細數無神勢屬重候再延非所宜也北沙參雲苓茯神蜜炙橘絡川貝玉竹金石斛苡米冬瓜仁鮮百合十四癲案河口王女病後氣血未復加以驚嚇肝膽內傷心血不附包絡鬱熱熱生痰痰熱相爭是以筋惕怔忡神志時昧怨哭不安脈息細數兼滑此乃虛中夾痰勢屬癲症法當寧心安神定志佐以清化徐徐治之青龍齒丹參茯神橘絡大貝石斛天竺黃夜合花白薇蓮心鮮竹瀝十五癇案海州吳女肝膽鬱熱已久致生痰涎漲漫厥陰少陽是以抽搐時作時止迄今半載有餘症成癇恙痰火根深非頃刻可消除先擬十味溫膽湯合清心法再訂丸方緩調為穩十味溫膽湯加蓮子心丸方虎睛烏犀角遠志肉山梔十三制軍大貝煉蜜為丸金按陳無擇云癇病之發其來猝至由於驚嚇臟氣不平肝膽鬱熱釀久成痰痰涎瀰漫所致應擬靈動鎮墜之品毋使痰熱上乘可保君主之官以供神明之用今選虎睛鎮心安魄犀角入手厥陰掃除鬱熱君臣有化育之功遠志寧神益志梔子引三焦火屈曲下行佐使無霸強之咎協以制軍通肝經痰結助以貝母為滌氣分痰蒙外加煉蜜能留戀下焦俾痰熱從二便解則神歸舍肝膽相寧脾胃健旺庶免舉發矣十六肝火沖肺案某氣血素虧加以肝火衝於肺絡咳嗽吐血日多骨蒸畏寒現當春旺之時其病更劇脈診細數且弦恐成不足又兼經停七月所慮尤深北沙參茯神金石斛橘絡大貝丹參連心麥冬甘菊阿膠藕汁葳蕤十七子癇風案漕憲署東李胎孕滿足肝熱素盛又兼外受風邪風乘火勢火仗風威致之頭痛痛極抽搐四五次舌苔水白人事明昧相參脈息寸口浮弦推之數大症成子癇風勢篤如風前之燈草上之霜勿可渺視肝陽與外風齊熾竄絡為疼疼極發痙抽搐較昨稍輕奈唇口色青寐則鼾呼懷孕勢屬不宜權以熄風定痙速得分娩為祥肝陽與外風熄之八九搐搦鼾呼幸平惟滿足未產又見降紅恐不利於胎仍望分娩乃吉方缺金按子癇風一症勢屬垂危自不待言治之得法尚可回春每遇此症予甚模糊不解大抵主病者倉卒之間總以熄風定搐為要法殊不知非盡然也冬十一月予有表弟婦乃校書中之字範星如之妻也伊曾得此延蘇懋翁協予診視議曰素知其稟性肝旺善怒又況初妊三四日前頭或痛止十五日晚初由嘔吐頭痛痛極發痙而起搐第一次鼾呼嚼舌角弓反張不醒人事搐止即醒尚能伸舌下榻解溲二次所嫌者頭痛太過飲水即吐約緩二時始搐第二次復蹈前轍搐止醒稍遲令其伸舌赤無苔並無青黑之跡其下接連抽搐九次愈搐愈緊人事直不醒牙關緊閉胎漸上竄闔宅驚駭無措懋翁與予同議一方不過熄風搐亦羚羊角散加減之意也與夫服乩方荊芥一錢全當歸三錢撫芎一錢生半夏一錢半百鍊草一錢半以及開骨散俱煎灌下亦定靜催胎之法也並令煮發者熄風之理也燒藏香者催生之道也然而均不濟事奈何奈何挨至十六日晚以及半夜皆煩躁發狂仍不知人事此際病者已凶其腹孕矣腹軟不大觀伊形狀慘極苦極予詈聲言曰服藥無效命系須臾豈真坐視待斃耶與其待斃莫若死當活治也照下死胎法治保大不保小即命僕婢撬開牙關灌藥胎一落而諸病則除商之於蘇曰然遂用平胃散加芒硝三錢大黃三錢切勿因峻厲藥而被迷惑也有吾徒丁月樓曰加麝香三分不獨穿經透骨反能助藥成功胎固殞而大命保存焉予細思之遂許加麝服候半晌雖弗見若何由四更後則不搐僅見面赤困睡困雖困喜其呼尚答應牙關稍開舌能出齒細看亦無別苔此風癇息痰熱降之象也十七日丁曰既獲效機照前方大黃取汁更妙予又許之再進一劑統用六錢芒硝六錢大黃六分麝香服候片時始聞腹鳴不已日將西斜人事忽醒自索茶飯問伊飢否點首曰飢即與饅首一枚食之食飲俱不嘔吐再問腹中痛乎動乎腰痠否答曰痛動俱無腰亦不痠只覺腹中鼓盪異常似乎下墜解溏糞一次一派大見轉機也十八日黎明又解溏糞一次解尿一次又兼下肉釘點巳時食糯米糕湯半碗究竟人事半明半昧怕煩喜睡痰熱未清所致午後又服化癥回生丹一粒或云胎已化矣予真不信因有舌苔可憑至丑時覺腹中撐墜約片刻即得分娩子母兩生可見藥用當則通神非盡以迂拘守一定之法為了事神而明之存乎其人慎勿忽略爾十八妊娠下痢案某妊娠六月滯下多日脈象沉實舌苔淡黃寒濕食鬱於陽明釀久成熱熱邪下迫所下皆紅醬形色窘痛努責症頗重要清通等劑倍嘗奈未獲效憶河間先生有云調氣則後重自除今擬其法以廓清腑邪統望應手方能云吉否恐隕胎生變方缺十九產後類中案許產後十六朝瘀血行而未盡復加類中右側因體寒先虛而後風邪襲腑氣閉人事昏糊時有抽掣今已四天鼾呼遺尿口張五絕已現其三診脈右部如絲之細左部豁大無倫近於雀啄一派情形生機最少可畏不及復中防明日汗脫生變姑用天麻二陳法稍冀萬一古人所謂與其坐以待斃莫如含藥而亡明天麻橘絡半夏桑葉炒甘菊鉤藤鉤天竺黃茯神丹皮上西珀荷筋另用宜常灌熱童便二十產後寒熱案東鄉附馬營許胎前稟賦本弱寒熱往來糾纏未退繼而產後人脈皆空當遵丹溪云與大補氣血為主縱有他症以末治之今惡露雖行無如不暢又加長夏暑濕外感氣滯內蘊盤踞陽明熏蒸太陰二經受病以致舌苔根膩中黃邊絳口渴乾嘔寒熱較甚入暮甫退飲食懶思咳嗽便瀉情形頗重攻補難施攻則反傷營衛補則助邪樹幟刻下先擬清通和化之法取其胃以通為補肺以和為貴統冀標症速解後調理奇經方缺二十一新產後案某新產七朝肝脾兩虧肝虛腹脹惡露不行脾虛食少白帶頻頻產後八脈均空慮成癆怯法宜益母八珍湯通補奇經益母八珍湯加酒炒丹參陳艾葉藕汁清童便二十二半產後案某素有血熱生風又加半產之後惡露不盡纏綿已久故胸腹脹痛飲食不進大便二十餘日未行乃腸胃屈曲處液涸燥結下既不通虛火必返於上沖肺則咳嗽氣粗症來頗險姑訂一方以看醫力元參大麥冬甜杏仁大貝茯苓柏子仁麻仁鮮石斛白蜜梨肉案某半產十數日惡露湧行乃瘀血未盡新血未生是以心悸頭眩飲食減少陰虛不寐陽虛汗多脈象弦細法宜黑神散進退雖補陰理陽最怕虛脫之變金按丹溪先生云產後禁芍恐酸寒伐生生之氣此語幾誤蒼生總而言之非定法也臨症見機而作可也炒當歸炒赤芍炒棗仁黃耆皮阿膠浮麥炙草柏子仁朱茯神熟地炭桂圓殼秋荷葉蒂飯上蒸二十三胎墮案王懷妊七月本屬肺經司胎之際胎陰難成易於隕墮今血行過多紫塊血胞之類血海業已受虧繼而產後百脈更傷氣無血附神無所依陰虛鬱冒熱沸上騰迷濛清竅遂致人事不醒時吐痰涎切脈右寸細小左關數澀最慮生風變痙茲妄擬小定風珠取其大隊濃濁填陰塞隙介屬潛陽預保元坤之欲脫亦防巽裂於將來鎮定以雞子黃一味從足太陰下安足三陰上濟手三陰使上下交合陰得安其位斯陽可立根基俾陰陽有眷屬一家之義則庶乎其不差矣雞子黃生用𢿱散阿膠燉化生龜底版大蛋菜清童便二十四梅核氣案某寡居六載家政幸勤矜持鬱悒勞損乎肝水虧木旺氣結橫於胸中痰氣交阻咽嗌如絮如棉吐不出而咽不下進食必嗆左關脈弦勁梅核氣已成此症務須懷怡志悅拋卻塵煩服藥庶幾有效倘疑以滋疑求效而莫得欲痊而難可反增劇焉今仿局方逍遙散治例歸身白芍醋炒柴胡茯苓桑葉丹皮炒大貝牡蠣九孔決明橘絡白旋覆花沉香汁青果核汁舟行水搖雖動勿傷其內陽動水消雖耗不歇其本此指逍遙散而言也已連服十劑復診症勢脈象頗平納食不嗆因屬應手尤須怡情適志既不追窮已往亦不可慮及將來切囑切囑仍宗原法乘除主治原方加佛手露黃玉金減醋炒柴胡沉香汁二十五脅痛案季間瘧留邪燒熱均減脅痛未除痛久必入血絡脈息芤澀乃氣血交痹是以時作時止前因經來不暢大怒動肝當擬扶正逐瘀兼加肝氣再力佐朱南陽泄濁治東洋參茯苓冬朮歸鬚炒桃仁山甲片橘絡滴乳香沒藥元胡索五香丸入煎兩頭尖韭白汁姜半夏二十六蓐勞案某臨盆時用力早陰陽已虧瘀未行盡拖延二十餘朝元氣尚弱新血弗能驟生致之少腹常痛肢體走疼自汗頻來形容日見羸瘦飲食不消虛眩無力症名蓐勞古云產後病有絲毫重於山嶽況此疾亦非輕淺勉用金匱方稍冀續命也當歸生薑新山人參蜜炙綿黃耆丹參山藥二十七黃疸案周婦經將畢血尚虛面垢氣粗懶食脈濡舌現膩苔腹滿大便燥身目尿黃此屬水穀之濕菸酒之熱蘊結陽明脾失運動濕鬱熱蒸濁凝氣聚日久化成膠固之邪儼如罨曲之狀故發陽黃疸症喜得色尚鮮明速治可愈近所慮者防轉陰黃之險西茵陳酒炒制軍炒山梔淡乾薑赤苓豬苓青皮瓜蔞仁白通草苡米澤瀉二十八產後氣粗案戴恙由胎前傷風咳嗽產後雖愈而氣血尚虛未能驟期豐盈繼加夙昔肝失條達鬱極化熱熱射於肺蘊畜不化致失清肅之權蔓延日久氣粗不已咳嗽時而見紅早起面腫近來飲食不甘明明子病及母速當保守肺陰氣和以降其熱資生脾土液足以養其肝仍須節制飲食悅志勿煩為妙如此一月可許瘥安否恐春分節近天人換氣厥陰之絡血上湧生氣再衰則不足之境擬投喻嘉言清燥救肺湯進退以治之方缺二十九休息痢案朱婦細辨右關沉分濡弱左關長夏現初春之脈推之澀兩尺輕舉則洪數久按如棉詢知因休息痢旬月肉脆經停疊進諸明公之法頗合機宜奈脾胃虧甚命門真陽虛極弗能固攝加以濕邪內蓄濁結氣聚脾胃大傷肝木鬱而不舒土必被克致胸痞不食膚腫脹且大青筋暴露自汗頻頻兩手時而發痙二便難於單解神識有三分昏憒以及痢下皆血視諸弊竇由痢變成滿症喘脫難逃今勢已至此恐病深藥淺鞭長莫及既招余治又何忍袖手勉遵用官方參苓白朮散除甘桔砂朮棗者避其膩補辛燥乘訶子益智固攝其陰荷蒂老米鼓舞胃氣以運中陽兼用蓮心獨保心臟聯冀一線之轉機也米炒東洋參白茯苓連皮扁豆新會皮冬瓜仁生熟苡米訶子肉益智仁懷山藥炒黃荷蒂陳老米蓮子心三十中暑案阮太太年及古稀體質應弱時值炎天酷暑忽然暴疾書所謂邪之所湊其氣必虛上騰之邪太過清空之所失職宜乎人事昏憒汗出濈濈此症中暑是也立方辛涼折其上騰之威佐以芳香透其清空之竅尚得人事明白可許六分圖幸人參至寶丹引捲心竹葉白豆花熟軍煎水和服三十一產後濕溫案蕭由夏月產生吸受暑熱入肺咳紅至秋未愈今忽面赤頭眩舌苔干膩不黃口常渴而不飲乎按皮膚不甚燔蒸業延四日書名濕溫顯系伏邪未入陽明已護膻中致神昏譫語診脈息濡數自云只熱無寒此溫為陽邪最善傷陰故方擬改從濕溫辛溫法變易辛涼輕宣上焦所謂無開門揖盜之法有輕以去實之能免傳中下炒銀花芥穗牛蒡子桔梗炒梔子薄荷甘草杏仁白豆花三十二瘧後懷孕案寶應吳瘧雖止尚有餘熱化而未盡又加人弱懷妊胎火上衝是喉間紅腫作痛以及口齒皆然因痛飲食難嚥理當兼治擬輕清清降之法速退即佳否防潰破雲苓皮炒條芩炒梔子甘菊花白蒺藜生甘草節苦桔梗橘紅大貝生白扁豆鮮荷葉三十三帶下案某心悸泛泛腰痠骨骱盡痛黃白帶下如注是氣虛不司攝脾胃之痰濕移於帶脈帶脈者如帶束腰肝腎內損漸及奇經例以淡滲固提劑真潞參雲苓甜冬朮米泔水洗黃土拌炒炙甘草橘絡半夏益智仁九制首烏懷山藥荷筋苡米三十四肉苛案某婦先腹痛而後經至期遲色黑脈右細左澀痛久臟陰失守指液垂涸筋脈失於榮養盜汗體疲行走未能適意昭然營氣虛則不仁衛氣虛則不用營衛氣虛則不仁而且不用名曰肉苛方缺三十五居經眩暈案某婦居經三月內燒減食肝之陽強脾不統血腹左有痞膨脹無妊脈發現素工針業目注神凝陽升人巔加以無因煩慮慮從心心虛包絡有熱煩從火火煉成痰痰在上火在下火炎上而動其痰故作眩暈身轉耳鳴如立舟車之上晝則喜笑多談夜則寤寐不安當沉潛虛陽以安神復入化痰滌熱以補心忌投剛燥俾痰熱去眩暈止再議調經方缺三十六便血案某婦經閉發燒便血日久脾胃之正氣皆虛行動則喘心中跳躍其動應手皮黃面浮食少脈細近防瀉血汗脫遠防木旺於春剋土腫脹仿歸脾實脾法土炒冬朮北沙參炙黃耆土炒歸身炙黑甘草茯神遠志肉棗仁煨木香橘皮小棗龍眼肉秈稻葉露三十七產後便難案某婦產後二十一朝營衛有傷瘀蓄熱結燥氣上逼則嗆咳無痰呼吸似喘肺不主宣布大腸與之為表裡腸間津液不足傳導失司少腹脹大便難方缺三十八胞中濕熱案鞠妊娠相近八月胞中濕熱移於小腸小溲作勒溺出赤白如膏經云有痛則為淋今不痛莫以子淋治川萆薢草梢炒梔子木通白苓澤瀉丹參盤龍草赤苓豬苓三十九悸動案某女倒經已愈診得兩關脈象頗平兩尺沉分似覺有力此肝漸調暢胃漸安和痰濕雖化而余蘊猶存陰虛來復內熱易生書謂陰虛於下宗氣散而不納逆而上行則浮撼於胸臆所以悸動弗能驟止盜汗時來今投輕補合原擬方缺四十血不歸經案童結縭九年不育是血少氣旺難孕性拘多怒怒傷肝肝陽沖灼不藏諸經血液則血菀於上暴吐盈碗益氣如橐籥血如波瀾天下無逆流之水逆者由乎風也人身無倒行之血倒者因乎氣也氣有餘便是火血不足則生熱今血不歸經錯經妄行用犀角地黃純陰入精血之品氣依之如魚得水血依之如霧復淵方缺四十一經病案某女服丸方後似合病機刻下天癸適來帶下紫血成塊佳兆也復脈細軟正氣素虛據述所行未暢擬用決陰煎以補為瀉順其勢而導之方缺四十二血癥案板浦廠楊婦服藥餌以來雖獲小效但血癥未消癥者真也氣聚血結由無形釀為有形之塊時而移之不動腹痛時作時止惟午後最多痛久入絡真陰與元氣衰乏陰血虛則發燒氣虛怯寒累及肝脾腎三臟土不生金虛陽上潛致側眠在左則咳嗽在右而痛更甚病勢反覆不一脈沉細浮分數有內損成癆之象況指日春分天人換氣防胃敗不食切慎方缺黃按婦女諸病其治無異於男子其異於男子者惟調經經閉帶濁崩漏癥瘕生育子嗣胎前產後諸病及乳疾前陰諸病不相同耳易曰大哉乾元萬物資始此言氣之始也至哉坤元萬物資生此言形之始也人得父母之氣以生氣生形即稟乾坤之氣也兩儀既兆五行斯彰故天一生水水屬腎名曰天癸又曰經水又曰月信如潮之有信如月之盈虧不愆其期先天天癸謂腎間之動氣乃稟自父母資其始也後天精血謂水穀之所化得之形成之後資其生也經云女子二七腎氣盛腎間動氣盛也二七而天癸至謂先天癸如中之動氣至於女子胞中沖為血海任主胞胎衝任皆起於胞中所以任脈通太衝脈盛血氣之行外循經絡內榮臟腑氣血調適運行不息上為乳汁下為月水匝月之間衝任血溢而行月事以時下故能孕子也褚澄云女人天癸既至逾十年無男子合則不調未逾十年思男子合亦不調此語固為不調之宗旨而起病由最冗論其常未盡其變也猶有因惡阻三月胎氣繫於脾如寄生之託於苞桑蔦蘿之施於松柏根蒂未堅誤感風寒或食生冷寒侵胞門凝於血分脾胃生氣被逼致虛墮滑難免衝任督帶諸脈有傷則不調或稟賦虛弱平素帶下頻頻則不調或房勞過度氣虛血少則不調或當經期鬱怒傷肝肝傷血耗則不調或因有熱則不調遂有錯經妄行過期不及期之弊或多或少或紫或淡則失其常候亦為之病也夫胎前有胎動胎病兒暈子淋子腫子懸子鳴子煩子瘖子癇等症重胎教者則免而產後為病尤多賴業醫者宜辨乎脈候以明內外之因審乎陰陽以別虛實之異病根透徹而施治轍效慎毋概以逐瘀為了事亦毋概以溫通為準繩今觀先生案中凡臨證未嘗不用攻濟然如室女天癸從未至肉瘦神瘁飲食不思少腹塊痛骨蒸咳嗽便溏者先生則曰先天最薄真陰不旺脾肺皆虧必成乾血癆瘵從養榮培脾例為法如經阻腹痛結塊如梭者先生則曰瘀血凝聚成瘕內燒心惕怔忡從舊血不去新血不生例為法如經閉晝夜寒熱納穀不甘咳嗽痰不易出頭時暈便時溏者先生曰衝任脈絡空虛土不生金金不制木木火凌肺勢成癆怯從培補坤元例為法如先因經來不暢繼而間瘧燒熱大怒動肝脅痛時作時止者先生則曰病久必入血絡氣血交痹從扶正逐瘀例為法虛實治得其宜可循次推之至於臟腑奇經內因之病機玄蘊難測即有友輩一二講者終屬模糊惟先生專於此條分縷晰看得其精微假如心包為痰熱蒙護用犀角以為安鎮靈臺肝升過極用決明以為柔和剛臟脾虛濕困用扁豆為充實中州肺有火灼用麥冬以清化金官腎水不足用熟地以為培補先天假如膽病宜進苦酸實則苦以泄之虛則酸以收之胃病宜進辛甘實則辛以通之虛則甘以緩之大腸三焦病實則咸以軟之虛則滋而潤之輕可去實也小腸膀胱病實則淡以利之虛則升而降之下病上取也若夫衝脈為病用紫石英以為鎮逆任脈為病用龜板以為靜攝督脈為病用鹿角以為溫煦帶脈為病用當歸以為宣補凡用入臟腑奇經藥靡不如芥投針先生讀書見症皆多而胸具靈機於內因之症一一尋源探本以上論症彷彿已備語云鴛鴦繡出從君看莫把金針度與人若用金針暗裡度全憑劉案指歸真庚申秋菊月九日伯喬黃樹森識四十三集方案中所用諸方悉載於後通關散一名滋腎丸知柏肉桂清宮湯元參心蓮心連翹心竹葉心連心麥冬犀角尖增液湯鹹寒苦甘法元參麥冬生地五心湯元參心麥冬心連翹心蓮子心燈心蘇合丸蘇合香安息香冰片犀角白朮熏陸香麝香香附木香沉香丁香上十一味為末逐一配勻量加煉蜜和劑作五十丸另以硃砂一兩水飛為衣蠟護臨用剖開井水生薑湯溫酒皆可化下一丸或加服原來古方尚有白檀香蓽撥訶藜勒局方載去之因其太澀燥耳河間地黃飲子熟地山茱萸石斛麥冬五味子石菖蒲遠志茯苓蓯蓉官桂附子巴戟天少入薄荷薑棗煎服防風通聖散大黃芒硝荊芥麻黃梔子赤芍連翹甘草桔梗川芎石膏滑石防風當歸薄荷黃芩蒼朮嚴氏實脾飲茯苓白朮木瓜甘草木香大腹皮五加皮草豆蔻附子乾薑厚朴滋陰復脈湯即炙甘草湯炙甘草人參生薑桂枝麥冬生地大麻仁大棗阿膠加酒煎服六和湯