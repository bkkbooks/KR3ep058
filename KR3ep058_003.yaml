body:
  text: 卷三幼童痘疹門一童損案袁江丁少小之年脈貴有神今診右寸關細弱右尺無神此未老見衰之脈加以稟賦先後天不足天一生水之源本從何至真陰既然日竭虛陽亟致亢害於是午後潮熱自汗懶食咳嗽頭暈形瘦力怯氣粗脅脹彈腹聲膨種種屬童損之症症延日遠趕緊調治為佳所幸情竇未開務須暫拋誦讀保身服藥自然奏績尚再耽延最防冬至節來陽長陰消之際反增異端耳方缺二鼻血案喬二少爺字小春幼年發胖體稟純陽氣血俱盛盛極則燔本素厚味太過不免炙煿之毒少火化為壯火血隨火升溢出清竅每日右鼻孔出血據述無多恐延久成衄莫可泛然作虛治惟張景嶽氣血兩治之玉女煎當可與嘗玉女煎用中生地加藕節三龜胸案汜水成相公素稟胎元不足熱乳內蘊蓋肺本清肅為諸臟華蓋水氣泛溢肺為之浮日久熱漸化風痰滯肺氣昏亂是以胸高脹滿形如覆掌咳嗽喘促溏泄蒸熱由此成疳由疳而成龜胸勿可小視三才膏見馮楚瞻錦囊書四龜背案某腮腫疳還盛脊高力已衰此因未滿半周強令坐早失護背脊以致客風吹撲傳入於髓經云五臟皆繫於背久則風生蟲蟲蝕脊髓背骨似折高露為龜矣大肥皂丸見馮楚瞻錦囊書五口糜案某心脾積熱移於小腸口舌破爛溺澀欲成口糜急宜清降生甘草苦桔梗山梔子黃芩生地木通連翹寸麥冬叉石斛竹葉燈心六慢脾驚案某先後兩天不足肝熱素盛復因風暑相搏熱急生驚乃風乘火勢火借風威連綿十餘日目定神呆面白嘔吐此屬未成急驚轉為慢脾驚症最難醫治勉用六君煎加減以盡心力孩兒參白茯苓焦於術消橘紅製半夏白扁豆炒苡米金石斛小紅棗炒黃荷蒂七痘案繆十三公女皮膚隱隱見點腹痛不安煩躁嘔惡神志恍惚舌白身熱系外感嚴寒內停食積表裡兩重謹防閉痘之險議用開發腠理望暢出為吉麻黃葛根牛蒡子荊芥蟬蛻楂肉青皮枳實川通草苦桔梗觀音柳喜花見點形細色滯腹痛煩躁口乾咽痛二便未行奈天氣嚴寒仍防半閉法當升透宣里暢出為吉羌活荊芥穗葛根牛蒡子桔梗青皮甘草楂肉酒軍枳實淨蟬蛻通草前胡觀音柳晚診顆粒漸出大便已解但形細色滯大小不均唇乾咽痛兼有腹疼心煩乃毒火潛伏仍宜歸宗意升透為要前方加赤芍去羌活甘草酒軍喜花一朝面部細碎顆粒大小不均頂薄根滯腹疼雖減奈咽痛尤甚唇腫口乾便溏神煩系毒火潛伏下險之症當清咽透齊之劑芥穗桔梗牛蒡子甘草赤芍連翹楂肉蟬蛻木通草羚角片熟軍芫荽晚診加馬勃大貝母山豆根減芫荽熟軍喜花二朝顆粒出之有八奈面部冗碎形平色滯咽痛口乾唇有微腫二便未行此乃素本氣弱又加天寒毒火潛伏先議墊陰逐毒佐以利咽之劑小生地取汁荊芥穗牛蒡子元參採連翹生甘草赤芍細木通苦桔梗羚角片山豆根酒炒紋軍冬筍尖白蘆根喜花三朝顆粒雖齊奈面部四肢細碎根血板滯乃氣弱毒盛恐難行漿所幸者咽痛稍減二便亦行議活血放白佐以清熱利咽小生地歸尾連翹元參桔梗牛蒡子粉丹皮天蟲赤芍上犀黃雄雞冠血竹筍尖白蘆根大紅洋皺晚診加北沙參米炒血竭糯米減雞冠血上犀黃喜花四朝顆粒頂平根滯項下攢簇氣血未附咽痛雖鬆奈面部冗碎色嫩系體質虛弱恐難化漿法宜助氣活血提頂速望放白漿行為吉西黨參生大有耆制山甲全當歸天蟲京赤芍元參苦桔梗牛蒡子上口蘑冬筍尖蘆筍大紅洋皺上洋米晚診加上官燕喜花五朝面部已有清漿之勢漸入佳境之象奈頂平兼陷根腳嬌紅內因氣血不充外被嚴寒所遏最慮漿行不足慎防七九朝癢塌之變擬當歸助氣養血提頂灌漿高麗參酒炙黃耆白歸身紫草茸元參連翹牛蒡子白姜蠶冬蟲夏草制山甲大紅洋皺冬筍尖口蘑上洋米晚診加丹皮大貝母蘆筍尖喜花六朝服藥頗順奈時值隆冬嚴寒外束今雖起綻行漿無如皮薄頂平書云皮薄而嬌紅有漿亦系清稀清稀則毒不能盡泄恐八九日另生變端法當氣血交補統望應手漿者為吉高麗參酒炙黃耆白歸身元參連翹紫草茸丹皮牛蒡子嫩毛犀角片制山甲白姜蠶炙甘草上洋米上口蘑冬筍尖蘆筍尖晚診加冬蟲夏草大貝母喜花七朝漿行七分時有嗆咳嘔惡黏痰大便五日未解小便短少黃赤混濁書云顆粒繁密而豆頂皮薄者漿行弗實漿既不實則防毒火內攻發之時必以補中溫托為主成膿之後當以涼血解毒為貴若屢用補托恐致燥熱考前賢諸醫有偏用溫補者有偏用苦寒攻下者均非定例當以補中末三治要察豈可混治所謂醫理最深審症立方不易要求無太過無不及無偏僻之弊也東洋參元參小生地粉丹皮大貝母連翹晚診加銀花燈心天花粉大麥冬水炒黃芩霍石斛活水蘆根喜花八朝漿足七分尚有三分毒火蘊蓄肺胃是以咳嗆時有咽痛嘔惡飲食懶進小溲混赤大便六日未解種種熱象若執古方偏見以投溫補恐留遺毒夫痘未有無毒火而發者昨云初中末三治要察此症系半虛半實初宜攻逐中宜溫補繼而陽亢陰虛當進清涼苦降以助結痂耳元參麥冬小生地銀花連翹霍石斛大貝母黃芩花粉滑石赤苓熟石膏白蘆根粳米煎水晚診加真象牙磨入喜花九朝漿勢漸回奈咳嗆未止又兼音嗄嘔惡頗平食谷不旺小溲黃赤而短大便雖解不徹刻下陽亢陰虛尚有三分餘毒毒火上凌肺金蓋肺為嬌臟主持諸氣屬金而畏火最防咳急增喘不可不慎議用滋陰潤肺化毒回漿佐以清涼苦降望應手為吉北沙參元參麥冬霍石斛消橘紅大貝母雲茯苓生苡米花粉澤瀉豬苓真象牙青果核生茶烏白蘆根羚角片喜花十朝漿勢漸回尤幸嗆咳漸減飲食亦增實痘毒雖從漿而化化而未盡猶有餘毒在內今身現銀疹奈毒又有出路之機漸入佳境之象仍望應手無弊為頌北沙參元參麥冬霍石斛金銀花連翹殼大貝母生茶烏羚羊角黃芩生苡米白蘆根喜花十一朝已成痂疕仍有微咳時有咽痛口乾舌下兼疼此屬餘毒未盡熏灼肺經議用清肺化毒主治忍冬藤元參麥冬枯黃芩大貝母淨連翹天花粉云白苓羚羊角上犀角鮮石斛取汁服渣煎燈心白蘆根緑豆皮喜花十二朝飲食頗進二便調通咽痛口乾均退時有微咳多痰舌尖之下作疼身現銀疹堆痧勢屬佳兆仍候痂落之餘再現瘢痕之色擬用清涼苦降以免餘毒之疥忍冬藤元參麥冬枯芩大貝母苦桔梗五穀蟲甜花粉羚角片連翹生茶烏白蘆根緑豆皮另用上犀黃珍珠共研細末擦舌下痛處八四朝漿勢未行案某喜花四朝面部稍有塌破周身紫滯不起漿勢未行此氣弱不能領毒外出毒火歲邪交感煩躁口渴飲水即啘聞谷惡食舌黃膩服攻下大便未解種種弊端皆與症不吉擬用清涼解毒助氣攻裡以望漿行納穀勤加看守方有生機之想鮮生地當歸尾赤芍川芎牡丹皮花粉上紅花西黨參綿黃耆連翹紫朴酒炒川軍上洋米酒炒黃連上口蘑白蘆尖活鯚花魚湯煎藥九五朝火不鎔漿案竹巷周喜花五朝顆粒稠而分界頂薄根血不附左項結毒腫硬不紅飲食少進大便頻溏此係體質素虛脾腎火衰火不鎔漿之象急宜大劑補充內托助漿法以盡力耳仍防九朝癢塌十一朝內攻喘變高麗參炙黃耆酒洗當歸白芷川芎肉果炮山甲苦桔梗上官桂煨廣木香上洋米口磨羚羊角十種痘九朝毒發右肢案范公館薪延公孫種喜九朝毒發右肢腫痛時寒時熱時有自汗大便四日未行此係胎元伏毒本重再加素有內熱致生此弊擬活血消毒定痛之方望應手為妙忍冬藤元參酒炒細生地全當歸川芎赤芍連翹上紅花生甘草節片薑黃酒炒紋軍上西珀荷筋白蘆根晚看早用清毒活血之品大便暢解黑色右肢腫痛稍松刻現皮膚見痧系餘毒頗有發泄之機擬當清熱透痧活血定痛望應手身熱漸退為佳忍冬藤連翹牛蒡子生甘草節炒赤芍蟬蛻通草上紅花白蘆根尖十一種痘後案某種痘後左項結核不潰不消此氣虛留余蘊未化又加曲池右膝蓋漫腫而痛時寒時熱頗糾纏擬扶氣化毒法方缺案安宜廬家塘廬女據述種花漿未飽滿漿既弗足餘毒從何而泄流注脾絡必致四肢腫硬不紅面色淡薄肌肉消瘦時有微咳主肺虛左目竄視屬肝熱熱勝多眵延今四十餘日飲食惡餐脾胃衰半土不生金顯然慢脾驚消息擬進培補法遵古治病求本也太子參雲茯苓甜於術白扁豆留白橘皮懷山藥土炒白朮炙甘草忍冬藤小紅棗荷葉筋十二受暑停食案漣水任種痘後飲食寒暖不調早晨頭熱腹脹泄瀉此脾陰不足胃陽亦虛濕滯蟠踞於內轉運失常已屬可慮刻診脈息病情外受新暑內停宿食之象所以泄瀉較前更甚舌現白苔口乾時渴完穀不化小便黃色體困無力勢防驚疳謹之慎之新會皮半夏曲雲茯苓六神麯須穀芽冬瓜仁廣藿梗六一散鮮白扁豆花十三疹案某外風與內熱遏膚胎毒共時邪發疹出而未齊之回又早邪毒逗留歸於肺胃是以面紅煩躁難安咳嗽嘔惡氣急紋過氣關漿粥不進五液皆干驚自內傳人小症勢頗危挨至明日寅辰二時痰壅大喘必變外用川雅連桔梗根朴前胡小京貝甘草焦楂西河柳琥珀抱龍丸引用南薄荷煎水和勻分三次服案某內傷乳食致脾胃先傷染時邪由口鼻而入表遏里壅身熱兩日舌膩虎口紋青鼻流清涕煩躁口乾多嚏咳嗽氣粗皮膚隱隱見疹法當清透松肌出齊為要否恐回早增喘荊芥穗薄荷苦杏仁乾葛牛蒡子蟬衣青皮前胡苦桔梗楂肉櫻桃核十四天吼案管左天吼半月目胞發浮咳嗽抬肩擷肚嘔痰身振面紅蓋肺主一身元氣今按其管九節之間皆被風熱旋繞失清肅之權由咳極嘔極氣無依歸故痰至咽喉而忽降屈郁中宮飲食泛茲即吐胸痛腹膨症勿小視趕緊擬二陳湯加桑菊飲驅內生之痰熱散外受之風邪矣過七十五日以外可許痊安消橘紅甘菊花赤茯苓生甘草枳殼桔梗桑葉苦杏仁白蜂房前胡絲瓜絡荷蒂梨皮十五纏喉風案邵由水痘四天誤食發物風熱內留顆粒變為瘡疥癢痛不休繼而自搽冰片等藥邪毒更無出路蘊伏肺胃致之咽痛舌黃啼哭無淚兩鼻竅張兩脅煽動肺脹喘滿胸高氣急神識漸近昏迷勢屬纏喉風險症今指紋已過命關縱有鮑姑艾灸文伯神針倉公韋氏重生總難濟旦夕之危方缺十六閉痘案某身熱暴甚旋見標點皮膚隱隱顆粒出之不快業經一晝夜此乃體質素虛內因胎元伏毒外因重感時邪氣鬱血瘀難以領毒外出遂令顏色滯點兼有葡萄癍痕證見煩躁唇裂嘔惡氣粗神昏迷睡閉痘何疑蓋其邪毒熏灼陽明凶險最甚倘凌及肺臟喘血必至種種情形毫無生理第以諄囑懇切不忍束手勉力思維一法以圖萬一之幸不負覆雛之意而慰跋涉遙臨也紫雪丹引取靛根蘆根煎水和勻分三次服十七慢驚案某本來脾胃虛寒新加病後戊己更傷樞紐失職以致嘔吐食不甘味精神倦怠大便鶩溏完穀不化勢成慢脾驚之候考斯症乃虛驚也與急驚之實症有云泥之別雖見驚搦勾總系木虛則動無風可逐無驚可療惟宜補火生土以運中陽培土涵木以安剛臟姑望有成方缺十八赤遊丹案某胎毒積熱鬱於肌肉由肌肉達於皮膚周身大塊發紅如火燎之狀露睛匝舌液涸便溺不解乃赤遊丹也且幼稚臟腑柔脆胃乏穀氣僅能少少與藥尤慮毒一陷心肺恐無好音連翹赤小豆皮金銀花大貝母牡丹皮黃芩川黃柏十三制軍生甘草緑豆殼十九雲頭疹案某由昨早腹中隱疼日曛時身忽暴熱今視舌中浮黃兩邊水白背四肢初起紅疙瘩漸運成片斷而不連燥癢難忍此名雲頭疹系外風引動脾肺之血熱遏搏皮膚若不忌口必變瘡瘍治宜小劑涼血清無形之熱消外來之風荊芥穗白蒺藜凌霄花當歸尾赤芍小生地白蘚皮荷葉邊紫背浮萍案徐發熱四五日來神倦不寧腰足俱軟詢知二日前左太陽逮承漿部位見點若隱若現勢如悶伏表裡兩不宣暢毒伏肝腎至陰之臟不得外越非雙解松肌芳香搜逐何以透發設或發出亦屬深畏方缺二十疹回風溫郁遏案陳疹將回熱未退風溫郁遏於上清竅不宣咳粗似喘有聲無痰尚宜開提肺氣前胡桑皮杏仁薄荷橘紅桔梗厚朴象貝紫菀木通玉金白蜂房觀音柳二十一六朝癟塌無漿案某痘六朝顆粒雖然圓綻奈樹小花多氣虛色枯不潤昨忽咬牙滑瀉食入便有不化之形致闊癟無漿漿不外達毒欲內陷有帶火干收之憂扶過十三十四險關尚得外療發臭再能納穀歸於正化可望挽回保元湯雞鳴散合方加味西洋參黃耆廣木香丁香炒歸身官桂廣皮甘草牛蒡子雞冠血入狀元紅三滴二十二痘後便血案某十七朝痂雖落而未充面無華色飲食無多脾虛不攝馴致腸中作痛糞後便紅此遠血也出於肝肺心肺之陽不能降肝腎之陰不能升陽不潛藏陰絡受傷況兼餘毒發揚熱擾神明煩躁譫語戰栗肢涼所謂熱深厥亦深方缺二十三復感下利案汜水南馬廠成云書乃郎素本先天不足加以暑濕內伏延經月餘體削勢欲成疳之象近又下痢四天紅白兼見腹痛後重幸身熱漸平脈息數而微大舌苔黃膩間有乾嘔口常渴而不飲此乃熱入營分無形之暑濕夾有形之宿垢未清症來非輕謹防噤口等弊之險擬芩芍湯加減留方仍候高明教正酒炒黃芩赤芍茯苓皮廣皮炒黑銀花飛滑石焦楂肉冬瓜仁雞內金生穀芽枇杷葉此症由病後元氣受虧近因復感下痢雖然新瘥奈脾胃蘇而未振面浮肌瘦脈細且數又加體質柔脆恐成疳疾本屆可慮況陰液未充肝陽獨旺愚細思之惟議扶脾健胃兼滋營液丸法緩緩圖治方克有濟不然湯藥常投必致損胃減谷欲求速功豈可得乎丸方雲茯苓懷山藥冬瓜仁薏苡米新會皮五穀蟲大白芍雞內金六神麯生穀芽熟穀芽佩蘭葉上法制㕮咀為末用黑穭豆衣金叉石斛熬膏為丸程按醫者性命之關係豈可不為深求最難者幼科也業此道全賴心誠看得真辨得透又何難之有大抵不越乎先後天之強弱緬經云先身而生謂之先天後身而生謂之後天先天之氣在腎是父母之所賦後天之氣在脾是水穀之所化先天之氣為氣之體體主靜故子在胞中賴母息以養生氣則神藏而機靜後天之氣為氣之用用主動故育形之後資水穀以稟生身則神發而運動天人合德二氣互用故後天之氣得先天之氣則生生而不息先天之氣得後天之氣始化化而不窮但幼童小兒亦不能脫此圈子何以見蓋幼童受病多半由二氣衰薄染病最易或由飢飽不一寒暄失調則脾胃日敗氣血漸傷或拘管太過則肝旺氣鬱屈而不伸或誦讀太急陰傷氣耗虧而難成或持重傷力跌撲停瘀經脈不和真陰與元氣日漸衰乏日復一日遂有童損龜胸龜背等症蓋小兒受病非由外感風寒則內傷乳食遂有驚風咳喘吐瀉寒熱疳癇等症且喜幼童情竇未開尚易辨治小兒臟氣清靈隨撥隨應果能確得其本而撮取之一藥可愈非男婦損傷積痼癡頑者可比至若痘疹一症俗名天瘡一名聖瘡言其變化莫測一名百歲瘡言其自少至老只作一番原其所由實由胎毒內藏命門四肢百骸而復因時氣外觸傳染相似是亦天行疫癘症也痘以稀朗為順稠密為險竟稀朗而收功竟稠密而全功者此亦天命非人力能挽回也痘有五要一要出得盡二要起發透三要膿漿滿四要收靨齊五要結痂厚論治將謂宗莊在田先生千至金寶又偏於溫暖溫暖是補益之稱將謂宗費建中先生救偏瑣言又偏於苦寒苦寒即攻伐之別此二公懷見相背用意淵深作後學楷梯奈後學每讀至此反懷疑莫釋如駕一葉扁舟誤入汪洋飄飄乎莫知其所止始終宜攻耶宜補耶疑惑業生有歧路亡羊之嘆從舍弟鈺受令祖老先生業命讀翁仲仁痘疹金鏡録真屬慈航普渡回春於掌握之間大得中和之道以此較彼忌無怪乎後車云前車之謬大抵要合天符歲氣當分稟賦強弱有先虛後實先實後虛有純虛純實有半虛半實頭緒雖多一言以蔽曰明辨之疹雖胎毒痘之末疾亦要出得盡惟二經受病脾與肺也內應於手足太陰外合於皮毛肌肉多帶天地間歲行診戾不正之氣鄉鄰傳染而成故曰疹也疹以春夏為順秋冬為逆以其出於脾肺二經一遇風寒勢必難出且多變症故於秋冬為不宜耳疳疾者疳者干也干生乎濕濕生乎土虛土虛生於飲食不節飲食不節生於初能飲食見食即愛不擇精粗不知飽滿食上加食況小兒臟腑柔嫩多食則不能化而脾氣鬱脾氣既郁有拘急之象兒之父母猶認為肌渴而強與之脾因鬱而水穀之氣不化而脾愈郁不為胃行津液濕斯停矣土惡濕濕停而脾胃俱病矣胃為陽明多氣多血之府中焦受傷無以散精氣則五臟之汁亦干營衛氣餒故多汗多血愈虛血氣故肢體日瘦中焦濕聚不化而腹滿腹日滿而肢愈瘦故曰干生於濕也種種古人來路知其要者一言而終不知其要者流散無窮今先生善於敏悟聞一以知十再參閲先生立案不啻與古為鄰深諳古人意立方虛用補實用攻寒用溫熱用清虛實並見則攻補兼施乃黃卷幼婦之章程也無毫釐之差千里之失足稱先生一片婆心保赤指南歲屆辛丑之春二月十日識於義貞祠秀峰程鍾
