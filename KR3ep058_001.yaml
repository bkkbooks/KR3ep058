body:
  text: 卷一六氣雜感門一春溫案張左春溫五天表裡齊病春者厥陰風木司天溫者火之氣風者火之母風火相煽上升太陰經則發大頭疫頭面紅腫氣息往來俱粗舌苔黃膩口乾怕飲大便未行小便短赤周身陽氣鬱遏皮毛之竅不開故身熱無汗最懼內陷暴喘之變金銀花連翹薄荷黃芩牛蒡子元參苦桔梗枳殼熟軍馬勃荷葉邊殭蠶去絲口洗案建陽鍾左夾陰春溫九天表汗雖解里滯未下小水不通及解時亦系清冷胸前重按作痛舌根之苔黃膩中灰缺津四肢稍涼診得脈右三部皆數乃邪滯深踞營分熱假邪威所致而左尺沉遲又屬濕濁陰凝之象究系腎主二便是也速宜溫化攻裡法應手不生遷變為妙淡肉蓯蓉黃柏乾薑水炒知母肉桂水炒滑石附子水飛酒炒黃芩元參鹽水炒大寸麥冬甘草水炒炒黃大貝瓜蔞仁淡竹葉十五制軍錠磨入案板閘尹左春溫夾疹八天舌膩浮黃脈息弦細胸前按痛燒熱煩嘔口苦乃邪傳足少陽膽汁無藏謹防化斑昏痙厄逆擬清透宣通法應手為吉薄荷苦杏仁去皮尖不研白通草炒枳實炒貝母瓜蔞皮牛蒡子川玉金赤芍結青皮磨入櫻桃核打碎荷蒂春溫夾疹九天形粗色滯勢欲化斑舌苔濁膩浮黃尖紅脈息弦細兼硬煩躁嘔惡胸前拒按此邪蘊蓄於內滯亦蓄內加以肝鬱不舒症屬重險防厄逆昏痙之弊炒桑葉酒炒丹皮茯苓皮水炒黃芩飛滑石白通草陳蔞皮仁炒黃大貝小枳實磨黃玉金磨干竹茹荷葉蒂春溫夾疹夾斑十天按脈右大於左舌根腐膩中心浮黃尖紅舌本作強脘右有形按痛臍下亦疼今日嘔惡已止二便未行譫語煩躁種種情形系陽明裡症已具勢如履冰誠防生歧擬用通里清邪化斑為要元參心麥冬心連翹心小枳實綿紋軍干咀淡酒炒粉丹皮生甘草赤芍炒黃大貝元明粉飛滑石羚羊角炒梔子白蘆根春溫夾疹夾斑十一天由昨服藥後小溲幸行大便未解胸腹仍然拒按脈息沉數而軟舌本有津苔色黃膩浮灰口渴頻飲的系無形之熱稍松有形之滯尚存仍屬險要法宗原擬加減應手無弊乃吉元參心麥冬心連翹心花粉瓜蔞仁炒大貝小枳實赤芍錦紋軍羚角片板藍根白蘆根春溫斑疹十二天連進通里清化法大便初解三分之一胸腹仍然按痛舌苔灰黃膩厚脈息沉數口渴時煩實緣里滯過重症仍在險途猶防另生枝節宜慎之元參麥冬花粉金銀花連翹黃芩丹皮梔仁炒大貝綿紋軍枳實輕滑石羚羊角板藍根白蘆根蔞仁春溫斑疹十三天大便屢解不徹胸腹按痛稍減舌苔厚膩漸宣灰色不退尖赤乾燥缺津按脈數軟此係里滯邪熱久踞是以未能驟清陰液為傷仍屬耽險擬用瀉南實北佐以緩攻之劑細生地取汁元參麥冬大貝母知母丹皮犀角片天花粉滑石炒山梔京赤芍熟軍錠連翹春溫斑疹十四天現已過經但里滯尚未清楚勢難屢攻惟陰液耗竭夙昔肝陽用事加以邪氛不靖致令面赤時煩多語今診脈象較前稍有和洽苔膩灰黑腐退此層退之消息也務宜平心息慮藥餌調攝庶幾脫然無纍擬五心湯加味為善元參心麥冬心連翹心竹葉心蓮子心另煎衝入白茯神霍石斛橘皮鹽水炒貝母上西珀乳石細研真枇杷露燉用衝入犀角鎊病今十五天案已疊載前方毋再瑣述今診脈症頗平仍擬原法出入謹慎調護是穩當之策也前方去竹葉心上西珀加粉丹皮銀花露二中風案某驟然口歪目吊語言蹇澀人事不知喉中痰鳴如拽鋸之聲六脈沾伏症屬中風險恙治宜行氣豁痰權望應手為要保過七日方定大局否防五絶明天麻赤茯苓福橘紅姜半夏天南星玉金汁廣木香陳枳殼雙鉤藤白殭蠶紫蘇子蘇合香丸和沖鮮石菖蒲鮮竹瀝生薑汁白蘿蔔汁服行氣豁痰之劑兩脈稍現沉小人事雖明語言仍不清楚舌強乃屬痰壅氣閉之故法宜開通治之前方去玉金汁枳殼天麻赤茯苓竹瀝蘿蔔汁白殭蠶鮮菖蒲加白芥子枳殼青皮輕菖蒲案某風為百病之長善行而數變加以素本陽勝陰微水火不制邇來思慮傷中痰熱上冒化風鼓蕩內外交作忽然人事不蘇喉中痰鳴此名真中但五絶全現無挽救之理勉用一方盡人力以待天命方缺三類中案某初起神呆遺溺老人類中顯然皆因平素操持過甚真陰受虧致之血虛生風風動經絡肢麻舌強語言蹇澀現症全屬不宜藥餌恐難奏功勉議河間先生地黃飲子法加減為治生地黃山萸肉霍石斛麥門冬北五味子淡肉蓯蓉制附片巴戟天白茯神清白乳童便案某氣虛類中右側不遂三天所服柔肝熄風之劑症勢稍回一二第脈細兼數心煩寐少此係虛中生弊餘邪未盡驟補難施擬宜清神寧志法方缺四厲風案安邑朱左風濕相乘臟腑痞塞氣滯血凝陽火所變初起身暈紅斑如癬之狀竄及兩膊面部漸有繼而眉白髮落四肢麻木業延二載體氣均虛趕緊醫治始妙否防轉為癘風方缺案某傷於風者上先受之傷於濕者下先受之今風傷於上致眉落面部發腫濕淫於下致腹脹兩腿作疼飲食難進夜臥不安脈象緩數有力勢已癘風之慮擬河間防風通聖法上下分消以觀動靜防風當歸連翹澤瀉梔子菊花赤苓蒺藜殭蠶白芷木通苦參大腹皮冬瓜仁干浮萍五破傷風案張左症由良肉受傷風入經絡致之口舌皆喑繼則牙關緊閉周身筋縮拘攣名曰破傷風險絶之恙勢不可援姑擬一法以待天命回春耳大凡破傷風眼必細口必噤白殭蠶白附子麻黃荊芥穗蟬蛻廣全蠍紅花甘草豨蘞草烏鴉翅六行痹案車橋鎮劉左稟賦素虧腠理疏豁風寒濕乘虛外襲三氣雜至合而為痹細推此理系風氣勝為行痹蓋風者善行數變故其為痛則走注歷節無有定所晝輕夜劇延久血中氣滯風屬陽痹屬陰陰陽互病刻下擬遵成法調氣血以祛風宣絡脈以散寒濕庶幾有益倘再遲延失治非所宜也方缺七木虛生風案某土虛生濕木虛生風肝既失於條達清陽不能展舒診脈右關濡細左關滑數一呼一吸之中俱帶動躍宜乎濕乘風勢而腫脹愈見風藉濕淫而搐搦更深仍有連搐不已痙厥之虞理擬實脾鎮肝熄風勝濕為要統望應手方得圖功否則根深蒂固雖神丹亦莫極矣方缺八血燥生風案本城蒲葭巷黃鉢喬先生素本脾腎均虛土不勝濕濕濁內蘊血燥生風風行水皺察脈右細數細為臟陰之虧數為營液之耗左弦大弦屬肝陽熾盛大屬風濕交加在上焦則發紫白癜風頭面間染眉發皆白在中焦則腹中鼓動痛脹異常稍餓則四肢無力在下焦則溲溺濁大便後兼有紫血蓋以濕邪灌溉一身則行動飲食多汗視此情形顯然虛象也考張介賓先生曰氣有生血之功血無益氣之力誠者氣為血帥也邇來治法倘泥於追風逐濕必致反損營衛刻惟舍末從本謹擬益氣養營之品俾血盈足而風自減培土勝濕之味令脾健旺而濕自除再佐平肝可冀根株漸拔矣丸方缺九風引肝陽案李外風引動肝陽頭痛不安脈息浮數無力虛中夾邪之象法宜熄風定痛平靜肝陽方本苦涼苦以降之涼以清之加半夏之辛溫者寒因熱用無格拒之患鉤藤鉤霜桑葉甘菊花白蒺藜消橘紅製半夏蘇薄荷夏枯草羚角片苦丁茶葉荷葉邊十胃腑風火案某陽明胃腑風火濕熱相搏走絡而痛痛在牙齦內外皆腫口不能張因痛胸中氣聚痰凝不降宜開降氣機化痰清熱方缺十一發腫案王營壽天成錢店謝左風水發腫二十餘天六脈沉緩小溲微短陰囊玉莖大而光亮系濕邪遏重昨進開發腠理之劑頭面得汗風邪漸解今擬行水消腫一方再商扶土法可也方缺膚腫頗消二便暢行漸入佳境之象惟囊莖仍然有光亮之形系風水濕邪下注當以實土製水統望應手無弊乃祥方缺案某遍體膚腫先因風濕所致迄今四月有餘脾腎均虧濕熱尚存過削則脾更虛過補則壅塞胃家惟嚴氏實脾飲法加減再延亦非佳兆服藥誠恐不效奈何方缺十二感寒案某奔走太急肺氣被傷適值感寒直入太陰是以右肋氣痛痰唾粉紅之色燒熱懶食舌白脈緊氣息不平症屬險要防喘方缺十三冒風案葉左路途冒風頭昏咳嗽咽關不爽此係肺竅不清致令身熱惡寒速宜解表利咽之劑苦杏仁香豆豉川芎薄荷蘇葉牛蒡子苦桔梗川玉金炒桑葉生薑皮十四濕毒成瘡案汜水成左此類中後濕毒成瘡之症也近時瘡痍雖減腫未全消乃濕毒尚存瀰漫陽明倉廩之官困鈍莫能腐熟水穀變化精微時臨盛暑陰氣隱伏於內陽氣浮越於外又兼食西瓜瓜性甘涼所謂甜能滿中寒則凝滯於是飲食懶餐形色脈更見式微可畏者年逾古稀以外氣血弱甚徒恃草根樹皮豈善策乎既承華翰諄托勉擬一方統冀得谷則昌方缺十五濕參陽位案某濕邪參於陽位面部先腫延及周身壅遏於中射肺則喘侵脾則脹兩關脈象緩澀飲食不思口乾腹滿勢有中滿之虞經云從上之下者治其上又云從上之下而甚於上者必先治其上而後治其下謹防腫甚大喘猛變妄擬河間中滿方上下分消茅山蒼朮川黃柏葶藶桑皮白蔻皮川通草大腹皮真紫朴赤苓皮海金砂萊蔔子雞內金冬瓜皮生薑皮十六暑感化瘧案某素本氣血兩虛肝鬱過重刻加暑感夾濕表雖汗解而邪滯未楚化為連瘧已來九次寒少熱多心煩不寐舌赤無津兼以作強口內生瘡診脈息弦數而細胸前按痛二便不暢此乃邪實陰虧之象勢屬險要防內陷膻中昏痙喘厄生變方缺十七痎瘧案寶應五之堂劉左夏秋暑濕宿滯深藏發痎日遠正虛邪強陽維為病寒熱難當來時形狀寒熱攸長或歌或唱或劇或康食不甘味二便失常脾陰缺運肺腎俱傷服我煎劑幸我功良漸來漸淡大小毋惶此名子母書解昭彰欣轉當午從陰反陽再加調養四肢寢昌荷君惠賜勝飲霞觴後寄書札囑敘丸方東洋參粳米拌炒雲茯苓現切曬乾野於術去皮切土炒白扁豆炒香懷山藥咀炒何首烏用小黑穭豆拌勻九蒸全當歸酒浸米炒鹿角霜隔紙烘南青蒿鱉血炒福橘紅文火炒烘青皮絡淡鹽水炒薏苡仁去心炒黃冬瓜仁炒黃建澤瀉青鹽拌炒上品依方虔修精製共取極細淨末用煨姜去皮紅棗去核荷葉水洗陳倉米淘淨四味同煎濃汁為丸如梧子大每早服三錢開水送咽考三陰之痎瘧朝夕難痊欲二氣之平均飲食宜節再加丸劑工夫謹慎調攝無有不告安之理茲選君主參苓為扶正之綱領臣輔術豆乃補土之權衡佐以山藥培胃弱虛元協以首烏療陰陽久瘧當歸和血中之伏邪鹿角霜通督脈之精室清營分退燒熱應藉青蒿入下焦理腎經必需澤瀉橘絡青皮絡宣絡化痰苡仁冬瓜仁益脾運濕薑棗屬營衛報使荷米資戊己功勳類皆扶正化邪益胃升陽法愚今所擬悉宗於書中有云治病必求其本本之為言根也源也世未有無源之流無根之木澄其源而流自清灌其根而枝乃茂此自然之精意也十八冬令伏邪案某冬令伏邪病經五六天昨藥後因熱極嘔吐不出微得涼汗汗後頭痛稍輕今診舌苔仍然滿白胸痞腹痛大便未解小便黃色此無形之邪夾有形之滯相搏已屬可慮更緊要者手指時時蠕動人暮熱甚恐生風變痙即宜和解宣通仍望應手則吉方缺十九內傷冬溫案某內傷冬溫十一天太陰肺病咳而無痰金受火克清肅不行氣機有升無降小便短赤舌苔滿布黃色此症兼有伏邪為患治之不易最怕見紅喘變方缺二十伏邪晚發案某伏邪晚發最深深而難化今已十天舌仍膩而微黃脈息細數昨服軟下之劑大便未解此腑陽熱結濕濁瀰漫是以不飢不食精神少而倦怠觀其面色㿠白系本質氣弱先當清熱和中潤腸為要方缺案某病發於冬源起夏秋今已七日舌苔尖赤後根中心淡黃而膩蒸熱不一鼻燥咽痛惡見燈火全是陽明腑病小便黃渾擬清裡分之熱方缺二十一病瘧不分案某泄瀉二十餘天復加病瘧不分舌苔燥黃而厚根有灰黑脈息細數煩渴身熱舌強耳聾驚惕時動胸前痞悶系暑濕之邪過重大便初醬形色乃熱逼下迫防昏痙之變金銀花連翹花粉飛滑石丹皮霍石斛豬苓赤苓澤瀉川黃連上西珀研和二十二斑疹九天案某斑疹九天舌苔黃燥熱重生火火重生痰以致發狂神識如蒙此係熱痰護於心包唇紅亂語脈無可憑症屬險要之極誠恐四肢厥冷喘厄而亡元參鮮生地汁麥冬黃芩炒梔子丹皮花粉連翹制軍瓜蔞仁滑石烏犀角川黃連膽星竹葉心二十三病後案某病今一月有餘胃陰受傷縱有宿滯亦從緩治經云氣壯而胃自開氣和而食自化今診脈息左關弦數右關濡弱木盛土衰之象若再推蕩恐滋腫脹之憂妄用定中湯加味得谷可免無虞北沙參雲茯苓土炒於術白扁豆須穀芽冬瓜仁炒苡米真橘紅半夏曲黃沙土熬水陳老米熬水二十四濕溫案西壩鹽棧梁左濕溫經十八天蒸熱不退舌苔膩白浮黃脈息弦數且濡兩尺無力胸前按之不痛小溲黃而不渾脘悶懶食咽關作窒此乃正不敵邪鬱熱失其下降之令是以咳嗽痰稠縱有宿食亦從緩治但本質陰虛肝旺濕邪過重勢非輕淺延防內陷之虞刻下補瀉難施惟宜淡滲和化佐以省胃之藥斯為穩當方法濕溫二十天昨服淡滲和化佐省胃之法頗合機宜今診脈象兩關稍平尺部微覺有力胃口漸開此佳兆之候也惟蒸熱尚未全退又且咳嗽痰稠小溲渾而兼黃明系濕痰內蘊蓋濕屬陰邪其氣留連最不易解擬善陽明和太陰法佐以淡滲之品望應手無弊為吉濕溫三候近服藥品飲食較前稍進蒸熱未增未減通體有汗身發銀疹是留連之邪從里達外也奈體質素虛伏邪化而未盡以致舌苔仍然膩白小溲猶見黃渾咳嗽時作痰唾稠黏種種情形都像濕邪為病仍屬可畏治當原擬加減冀其熱退方可而安濕溫二十餘天進扶正化邪法又得更衣次小溲黃而稍清濕熱已減納穀頗香戊己較醒之徵第素質過弱加以症延多日氣血交餒虛陽不斂逐令咳嗽痰稠午後蒸熱按脈細數憶書云肺陰虛則多嗽腎陰虛則發燒正此義也豈苦寒所可投耶今擬育陰潛陽之劑冀其咳平熱退乃為祥吉濕溫相近一月前服諸藥雖然未見大效與症甚為相對無如久病肺腎陰虛一時難以驟復稽內經曰陰虛生內熱熱邪上凌遂為咳為嗽或蒸或熱然肺為嬌臟主持諸氣最防咳急增喘不可不慎邇來飲食雖進脈仍細數的是邪少虛多之恙也擬當滋陰復脈湯且觀後效何如方缺案濕溫經十二天昨日腹痛窘急成痧針刺出血又兼尉法治之二便俱通通則痛止今診脈仍弦而不調舌苔淡黃之色胸前按痛手不可近此中焦塞結邪實正虛是大危之象小枳實真川朴瓜蔞皮橘紅製半夏白蔻仁六神麯赤茯苓川玉金飛荷梗二十五霍亂案某外受寒暑內傷飲食清氣在陰濁氣在陽營氣順脈濁氣逆行清濁相干亂於腸胃則為霍亂故上吐下瀉脈伏身寒四肢逆冷頓亡津液宗筋失養以致攣縮症已險極治之甚難法宜六和湯姑救之方缺二十六痢疾案清阿五左暑溫夾濕吐瀉轉痢戊邪傳癸名為賊邪延今十七天舌苔白底中灰缺津肢涼脈細腹痛困睡此暑濕傷陽正不勝邪年高屬險桃花湯加味應手則生江西赤石脂炒黃淡乾薑水炙甘草制附片茯苓塊新會皮冬瓜仁長鬚熟穀芽土炒甜冬朮荷蒂飯上蒸陳老米案某濕傷脾陽脾傳於腎由便利轉成滯下在經名膿血本屬難治況二氣素虛飲食毫不能進舌苔白膩口淡無味命火式微奉生者少按脈右關不鼓兩尺微細勢重已成噤口公議溫通通乃痢之首法佐大和中土納穀乃佳方缺案前仕楊漕憲字疊云吐瀉轉痢脾傷及腎在書名為賊邪已屬可畏更緊要者年近九旬二氣均虧勢難勝任按脈息弦大無力舌苔黃膩身熱肢冷時有噯氣肢動此寒暑濕食雜感為患慮有昏痙厄逆之危人參柴胡酒炒黃芩製半夏橘皮赤苓甘草楂肉木香煨姜紅棗昨藥後肢冷雖轉痢仍未除今診右脈弦大無力左脈間有歇止舌苔膩而缺津正氣下陷津不上達高年患此勢難勝任防五日後昏痙脫變勉留一方以感大憲下士之隆耳木香異功散加荷葉陳老米案某少陰久痢飲食少思營衛不和時而寒熱脈象細弱無神法宜陰陽平調延防敗脫真武湯加潞黨參土炒懷山藥山萸肉炙甘草廣皮白煨木香小紅棗二十七痧案本城丁光橋陳左考古痧症乃因天之風雨寒暖不時地之潮濕疫邪蒸動隨天地升降流行其間人屆氣交中無可逃避虛質犯染重則為緊痧輕則為暗痧暗者輕緩之說也其發無定或十日半月一發或一月二月一發久必元氣日衰邪氣日盛戊己不充每逢交夏精神少而疲倦飲食懶思診脈濡細理宜固其根蒂培其胃氣則痧自可除矣丸方赤苓白苓山藥白扁豆雞內金新會皮半夏曲霜桑葉粉丹皮山梔子六和曲須穀芽使君子冬瓜仁苡仁米以上共碾極細之淨末用荷葉蒂陳老米煎濃汁為丸如小緑豆大每早空心服開水送咽金按此方補而不滯宣而不猛之法也君取赤白茯苓益氣生血臣輔山藥扁豆健胃培元佐以雞肫磨積消穀之指揮協以二陳理氣除痰之報使桑丹泄少陽之郁梔子屈曲而下行曲谷和中猶妙於轉輸使君子殺蟲去腐冬瓜仁清熱悅顏薏苡滲濕散脾精兮己土荷米養正防秋燥兮兌金諸藥品有益無損每晨帶服久則精神漸壯氣血豐盈何病之有二十八痿案某四肢麻木拘攣屈伸不便起自客秋風濕熱襲入陽明脈絡為患傷考之陽明一經主潤宗筋束筋骨而利機關今機關不利筋骨不束恰合內經所論大筋耍短小筋弛張為痿之義理當養血榮筋開通脈絡為治方缺二十九鼻瘜案某肺氣注於鼻上榮頭面風寒客於頭腦則氣不通上焦積熱鬱久而生搏於津液以致鼻中生瘜如雨霽之地突生芝菌也蓋氣不能上升則鼻塞滯所謂九竅不和不知香臭經云五氣入鼻藏於心肺有患鼻為之不利也視聽明而清涼香臭辨而溫暖法治先散風寒後補胃氣使心肺之氣得以交通則鼻利而香臭聞矣方缺三十牙宣案某陰虛胃火上炎牙縫出膿出血恙延半載之多症屬牙宣惡候久進苦寒瀉火不效今擬甘寒養陰為法再延非宜細生地丹皮貝母生甘草赤芍石斛連翹天門冬麥門冬知母陳龜甲烏犀角藕汁童便白蘆根梁按外感六氣者風寒暑濕燥火也其中有淺深之殊其治無㿌雜之法余髫齡務舉業時嘗覽喻氏論冬不藏精春必病溫將不藏精之字先宜細心體察暨須活看不專主房勞苟專主此便有疵謬凡一切人事勞役皆能搖動其精又按素問經上古天真論即言男女陰精之所以生所以化所以枯之理次章緊接調神大論示人春養生以為夏奉長之地夏養長以為秋奉收之地秋養收以為冬奉藏之地蓋善藏者一切病患皆可卻豈獨溫病為然哉金匱謂夫精者身之本五臟元真暢茂人即安和是也稍不謹慎保身如春傷於風夏必飧泄夏傷於暑秋必作瘧秋傷於濕冬必咳嗽冬傷於寒春必病溫顧每歲之溫有早暮微盛不等司天在泉主氣客氣相加臨而然也抑四時之氣候乖違春應溫而反寒夏應熱而反涼秋應涼而反熱冬應寒而反溫是反令之常為氣之變也人一觸染寒溫由毛竅口鼻而入傳於經絡鬱於臟腑體壯者安然無害體弱者至春夏發泄之令必發斑疹等證初春陽氣始開溫氣發越厥陰行令風夾溫也時邪者春末夏初溫疫厲風流行多兼穢濁沿門履巷如是也溫毒者諸溫夾毒穢濁太甚是也暑溫者正夏之時暑病之偏於熱者也濕溫者長夏初秋溫中生熱即暑病之偏於濕者也伏邪者必待深秋晚發也冬溫者冬應寒而反溫陽不潛藏陰精不足以承之民病溫也諸瘧者皆不能離乎肝膽畢竟由伏邪而成非旦夕之因為患也六淫之氣惟燥不能為害而新涼收束實屬有關痢疾者治分新久古稱滯下此滯字非特為停滯飲食而言惟夏秋暑濕夾積居多內侵腑中流行濕蒸熱瘀阻遏而為滯矣其次則風淫火迫寒侵也其邪之來似水之流臟腑間有罅隙則乘虛而作故有在氣在血之分干於氣則白干於血則赤傷臟傷腑之異傷腑易治傷臟難醫甚致於有休息痢不休不息延必腫脹十中五生也五色痢形如鶩溏並完穀不化及莧菜汁屋漏水者犯弊難愈十中一生也夫論中風症則真中類中類者僞也風為百病之長善行而數變此風雖從外來亦由內虛邪得以乘虛而入北方風氣剛徑風高土燥南方風氣溫柔地卑水濕西北人常苦渴閉癰瘍東南人多染疸腫泄痢真中之病南鮮北多其真中之方前人已大備並類中症有劉河間李東垣朱丹溪三賢逐一辨之此不復述核葉天士指南篇發明內風乃身中陽氣之變動肝為風臟內經又謂將軍之官其性暴其動速無病則藏血有病則逆血精血衰耗水不涵木木少滋榮故肝陽偏亢內風時起一節真確論也但風寒暑濕燥火六字主病多端弗克盡述今略敘源由以包羅萬象耳先生天資卓識辨脈識症會悟機緒活潑立案深得古人心立方深得古人法足徵筆下生春壽人壽世不愧世傳醫也余本不精岐黃道諺云隔業如隔山既承先生賜以手冊命以批點及開卷細讀熟玩不勝神爽心快頓教醫境之茅塞大開每見先生臨症望聞問切大有把握著案貫通用藥合病窮理細膩無以出其右非目無全牛學力精鋭者奚能至此歲屆咸豐九年秋八月穀旦愚弟梁寶生佐中氏書於袁江公廨
