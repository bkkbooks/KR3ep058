body:
  text: 自敘昔唐陸宣公晚年家居甚留心於醫間有秘方必手自抄錄曰此亦活人之一術也宋范文正公少時嘗曰吾不能為良相必為良醫以醫可以救人也夫古之賢人君子既以此為濟世利民之用則醫之一道誠未可以鄙夷視之也亦未可以淺學求之也吾家業醫三世矣閱歷亦云多矣雖皆不敢居利人之功而要未嘗貽害人之弊故數十年謬蒙鄉里士大夫交口稱許蓋積誠所感也金不敏紹祖父之業存利濟之懷幼而讀書長而涉世凡於視疾切脈辨症修方罔弗慎之又慎或秉先人指授或參前輩緒言初未敢妄執己見以貽誤當世此則金之可以自信者也頃者及門某手輯醫案若干冊皆金十餘年來臨證之方也匯而錄之欲資以為模範其用力可謂勤矣其用心可謂篤矣金不欲違其意爰自敘其梗概如此非敢執以問世也不過與二三弟子質疑求備互相商訂云爾咸豐己未年孟春白衣大士聖誕日淮山儒士劉氏金方識凡例一醫道自上古神農本草經內經靈素難經而下晉唐宋元以來歷世名醫首推張仲景論傷寒溫熱溫疫奧旨劉河間論濕熱及瘟疫內傷李東垣詳論內傷陰虛補中枳朮等語卓識千古朱震亨闡發陽常有餘陰常不足之論以補前賢所未逮而民病民命亦大全矣夫復何言殊不知四子之書將謂講究理法則絲絲入扣讀之則悅口悅心但臨證立案則不合金幼年習業嘗讀內經景岳大全並我朝醫宗金鑑文深義奧局緊機圓大可宗也又細玩葉薛繆三家醫案又博訪吳鞠通溫病條辨皆文辭古雅茲集兼總諸家而會通之以各適於用故六氣門派春溫為第一春屬和煦之時溫乃天行之氣又繹周天度數天開於子地闢於醜人生於寅寅又屬春春佔四時之首萬物萌動資始資生古人尚且推重而今詎可不講乎一儒林史冊為要務醫林方案為提綱試觀世醫聰明者有之鄙陋者亦有之究竟陋多明少立案奚求精粹用藥難訂湯頭案不成句法藥不按君臣良可嘆也一醫案字句重疊藥味雷同閱此者莫譏襪線之才竊笑空虛之腹豈不聞孟子云乎離婁之明公輸子之巧不以規矩不能成方圓比之醫家亦須如是固不逾乎規矩亦不能泥乎規矩字眼易換藥味更遞亦適中庸之道而已一書名有有案無方以缺方字代無姓氏住處者以某字代並非沽名而釣譽系診畢歸舍擇摘順句只錄其案未曾錄方日久忘記暨先祖遺稿夾雜知之為知不知實不敢捏造妄登願同志者諒之一遵用古人方必增必減或不增減者皆隨症施治用古方療今病譬若拆舊料改新房不再經匠氏手其可用乎神而明辨而通存乎其人萬不可拘執一各方分量當其時雖對病的確今不定分量者如往後治病表裡偏盛寒熱虛實弗能刊版立碑臨證變通可也一婦女疾與男子疾迥異因其有行經經閉胎產癥瘕等事也且肝為先天性情多郁容易生病故不雜於男子案中茲特詳著於後一幼童痘疹諸症亦當分別治之蓋童子不擾七情六慾幼稚更不待言所傷不過寒暄乳食飢飽不調抑胎元本弱抑受傳染時行汙濁之邪致恣生萬弊立案宜明用藥尤慎倘能分虛實判寒熱屬表屬裡在表宜發汗在裡宜攻滯又當知傳手傳足虛則補實則瀉寒則溫熱則清治不濛混毋伐天和方許升仁壽之堂入軒轅之室也一四卷只百十餘案客問何其鮮也答曰從行道數十載豈僅看此數病歟亦不過借水行舟觸類旁通之義每朝夕課徒行有餘力即抑屋圖維揮毫選錄之時猶謹小慎微深畏訛錯撫膺細思醫家不啻掌握兵權須臾命系大凡醫人切脈領會病情用藥當則通神立起沉疴精神踴躍如將帥有謀運籌帷幄兵在精而不在多立剿寇盜世界昇平矣一通體原不超奇拔萃大致層次尚清爽詞貫理明天下無越一理理順則言順遍覽庸輩醫案零落殘斷頭緒不清者居多若執此說必疑僭狂然有憑有據略表與聞昨見胸中一塊夜夜發燒濕氣復來腫脹兼施之句請青眼鑑經應篇尋思鄙見思過半矣
